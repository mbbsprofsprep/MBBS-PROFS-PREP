                    qHtml += '<div class="space-y-1.5">';

                    if (item.options && Array.isArray(item.options)) {
                         item.options.forEach((option, idx) => {
                            const optionLetter = window.optionLetters[idx];
                            const isCorrect = optionLetter === item.ans_key;
                            const cleanOption = option.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

                            if (isCorrect) {
                                qHtml += `<div class="text-sm text-slate-600 dark:text-slate-400 ml-2">
                                            <span class="correct-option">${optionLetter}) ${cleanOption}</span>
                                          </div>`;
                            } else {
                                qHtml += `<div class="text-sm text-slate-600 dark:text-slate-400 ml-2">${optionLetter}) ${cleanOption}</div>`;
                            }
                        });
                    }
                    qHtml += '</div>';
                } else {
                    qHtml += `<div class="theory-question shadow-sm dark:bg-dark-surface dark:text-slate-300 dark:border-slate-600"><span>${cleanStem}</span></div>`;
                }
                cell2.innerHTML = qHtml;
                
                let cell_type = row.insertCell();
                cell_type.className = 'px-4 py-4 text-center align-middle';
                const badgeColor = item.type === 'Theory' ? 'bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/30 dark:text-amber-300' : 'bg-brand-100 text-brand-800 border-brand-200 dark:bg-brand-900/30 dark:text-brand-300';
                cell_type.innerHTML = `<span class="${badgeColor} border px-3 py-1 rounded-full text-[10px] uppercase font-bold tracking-wide whitespace-nowrap inline-block">${item.type}</span>`;
                
                let cell_chapter = row.insertCell();
                cell_chapter.className = 'px-4 py-4 text-left align-middle border-l border-slate-100 dark:border-slate-800';
                
                let chapterHtml = '';
                const chArray = Array.isArray(item.chapter) ? item.chapter : [item.chapter];
                chArray.forEach(ch => {
                    const unitName = window.getUnitForChapter(ch);
                    chapterHtml += `<div class="flex flex-col mb-2 last:mb-0"><span class="text-[10px] uppercase tracking-wide text-slate-400 font-bold mb-1">${unitName}</span><span class="text-xs font-medium leading-relaxed text-slate-700 dark:text-slate-300">${ch}</span></div>`;
                });
                cell_chapter.innerHTML = chapterHtml;

                let cell_exam = row.insertCell();
                cell_exam.className = 'px-4 py-4 text-xs text-slate-500 dark:text-slate-400 border-l border-slate-100 dark:border-slate-800 align-middle';
                const batchString = Array.isArray(item.examBatch) ? item.examBatch.join(', ') : item.examBatch;
                cell_exam.innerHTML = `<div class="uppercase font-bold text-[10px] text-slate-400 mb-1">${window.COLLEGE_NAME}</div><div class="font-semibold text-brand-600 dark:text-brand-400">${batchString}</div>`;

                let cell_ai = row.insertCell();
                cell_ai.className = 'px-4 py-4 text-center align-middle space-y-2';
                
                cell_ai.innerHTML = `
                    <button onclick="window.askAI(this, window.displayData[${index}])" class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 px-3 rounded-lg shadow-sm transition-all duration-200 text-xs flex items-center justify-center mx-auto gap-1 w-full max-w-[80px]">
                        <span>Ask AI</span>
                    </button>
                    <button onclick="window.openReportModal('${item.q}')" class="bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-semibold py-2 px-3 rounded-lg transition-all duration-200 text-[10px] uppercase tracking-wide flex items-center justify-center mx-auto gap-1 w-full max-w-[80px]">
                        <span>Report</span>
                    </button>`;
            });
        };

        // Filter Logic
        window.getUniqueValues = function(key) {
            const values = new Set();
            window.displayData.forEach(item => {
                if (key === 'type') values.add(item.type);
                else if (key === 'exam') { Array.isArray(item.examBatch) ? item.examBatch.forEach(e => values.add(e)) : values.add(item.examBatch); }
            });
            return Array.from(values).sort();
        };

        window.populateFilters = function() {
            window.createMultiSelect('typeFilterWrapper', 'typeSelect', 'Type', window.getUniqueValues('type'), 'types');
            window.createMultiSelect('chapterFilterWrapper', 'chapterSelect', 'Chapter', window.curriculumData, 'chapters', true);
            window.createMultiSelect('examFilterWrapper', 'examSelect', 'Exam Batch', window.getUniqueValues('exam'), 'exams');
        };

        window.createMultiSelect = function(containerId, dropdownId, label, items, filterSetKey, isGrouped = false) {
            const container = document.getElementById(containerId);
            let listHtml = '';
            
            if (isGrouped) {
                items.forEach(group => {
                    listHtml += `<label class="multiselect-group-header"><input type="checkbox" onclick="window.toggleGroup('${group.unit}', this.checked)"><span>${group.unit}</span></label>`;
                    group.chapters.forEach(chapter => {
                         listHtml += `<label class="multiselect-option"><input type="checkbox" value="${chapter}" data-group="${group.unit}" onchange="window.handleCheckboxChange('${dropdownId}', this.value, '${filterSetKey}', '${label}')"><span>${chapter}</span></label>`;
                    });
                });
            } else {
                items.forEach(item => {
                    listHtml += `<label class="multiselect-option"><input type="checkbox" value="${item}" onchange="window.handleCheckboxChange('${dropdownId}', this.value, '${filterSetKey}', '${label}')"><span>${item}</span></label>`;
                });
            }

            container.innerHTML = `
                <div class="multiselect-container">
                    <button type="button" class="multiselect-btn" onclick="window.toggleDropdown('${dropdownId}')">
                        <span id="${dropdownId}Text" class="text-slate-400 dark:text-slate-500 font-semibold">All ${label}s</span>
                        <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="${dropdownId}Menu" class="multiselect-menu">${listHtml}</div>
                </div>`;
        };

        window.toggleDropdown = function(id) {
            document.querySelectorAll('.multiselect-menu').forEach(menu => {
                if (menu.id !== id + 'Menu') menu.classList.remove('show');
            });
            document.getElementById(id + 'Menu').classList.toggle('show');
        };

        window.closeAllDropdowns = function(event) {
            if (!event.target.closest('.multiselect-container')) {
                document.querySelectorAll('.multiselect-menu').forEach(menu => menu.classList.remove('show'));
            }
        };

        window.handleCheckboxChange = function(id, value, filterSetKey, label) {
            const set = window.filterState[filterSetKey];
            if (set.has(value)) set.delete(value); else set.add(value);
            window.updateButtonText(id, set, label);
            window.filterTable();
        };

        window.toggleGroup = function(unitName, isChecked) {
            document.querySelectorAll(`input[data-group="${unitName}"]`).forEach(cb => {
                if (cb.checked !== isChecked) {
                    cb.checked = isChecked;
                    window.handleCheckboxChange('chapterSelect', cb.value, 'chapters', 'Chapter');
                }
            });
        };

        window.updateButtonText = function(id, set, label) {
            const btnText = document.getElementById(id + 'Text');
            if (set.size === 0) {
                btnText.textContent = `All ${label}s`;
                btnText.className = "text-slate-400 dark:text-slate-500 font-semibold";
            } else {
                btnText.textContent = `${set.size} ${label}(s) Selected`;
                btnText.className = "text-brand-600 dark:text-brand-400 font-bold";
            }
        };

        window.filterTable = function() {
            const searchText = document.getElementById("searchInput").value.toLowerCase();
            const table = document.getElementById("qnaTable");
            if(!table) return;
            const tr = table.getElementsByTagName("tr");
            
            for (let i = 1; i < tr.length; i++) {
                const dataIndex = tr[i].getAttribute('data-index');
                const item = window.displayData[dataIndex];
                if(!item) continue;
                
                let showRow = true;
                if (searchText) {
                    let rowText = (tr[i].cells[1].textContent || "") + (tr[i].cells[3].textContent || "") + (tr[i].cells[4].textContent || "");
                    if (rowText.toLowerCase().indexOf(searchText) === -1) showRow = false;
                }
                
                if (showRow && window.filterState.types.size > 0 && !window.filterState.types.has(item.type)) showRow = false;
                
                if (showRow && window.filterState.chapters.size > 0) {
                    const chArray = Array.isArray(item.chapter) ? item.chapter : [item.chapter];
                    if (!chArray.some(ch => window.filterState.chapters.has(ch))) showRow = false;
                }
                
                if (showRow && window.filterState.exams.size > 0) {
                    if (Array.isArray(item.examBatch)) {
                        if (!item.examBatch.some(e => window.filterState.exams.has(e))) showRow = false;
                    } else {
                        if (!window.filterState.exams.has(item.examBatch)) showRow = false;
                    }
                }
                tr[i].style.display = showRow ? "" : "none";
            }
        };

        // --- Ask AI & Modals ---
        window.askAI = function(button, item) {
            let textToCopy;
            const cleanStem = item.stem.replace(/<[^>]*>/g, ""); 
            if (item.type === 'MCQ') {
                const optionsList = item.options ? item.options.map((opt, i) => `${window.optionLetters[i]}) ${opt}`).join('\n') : "Options not available";
                textToCopy = `I am studying for a ${window.SUBJECT_CODE} exam. Please explain this MCQ in detail:\n\nQuestion: ${cleanStem}\n\nOptions:\n${optionsList}\n\nCorrect Answer Key: ${item.ans_key}\n\nPlease explain why this option is correct and why the others are incorrect. Refer to Chapter: ${item.chapter}`;
            } else {
                textToCopy = `I am studying for a ${window.SUBJECT_CODE} exam. Please provide a structured model answer for the following theory question:\n\n"${cleanStem}"\n\nInclude relevant headings, clinical features, and management steps. Context: ${item.chapter}`;
            }
            
            const temp = document.createElement('textarea');
            temp.value = textToCopy;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);

            window.showModal("Copied to Clipboard!", 
                `<p class="text-sm text-slate-500 dark:text-slate-400">The question prompt is ready. Open ChatGPT to get your explanation.</p>`, 
                `<button onclick="window.openChatGPT()" class="w-full sm:w-auto px-6 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl font-bold transition-colors">Go to ChatGPT</button>
                 <button onclick="window.closeModal()" class="w-full sm:w-auto px-6 py-3 bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 rounded-xl font-bold transition-colors mt-2 sm:mt-0">Stay Here</button>`, 
                `🧠`
            );
        };

        window.showModal = function(title, bodyHtml, footerHtml, iconHtml) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body-content').innerHTML = bodyHtml;
            document.getElementById('modal-footer-buttons').innerHTML = footerHtml;
            if(iconHtml) document.getElementById('modalIcon').innerHTML = iconHtml;
            document.getElementById('actionModal').classList.remove('hidden');
        };

        window.closeModal = function() {
            document.getElementById('actionModal').classList.add('hidden');
        };

        window.openChatGPT = function() {
            window.open('https://chat.openai.com/', '_blank');
            window.closeModal();
        };

        // --- Deck Mode System ---
        window.isDeckMode = false;
        window.activeDeckQuestions = [];
        window.deckIndex = 0;
        window.deckStatus = {}; 

        window.populateDeckFilters = function() {
            const container = document.getElementById('deck-filters-container');
            const chapters = [];
            window.curriculumData.forEach(c => chapters.push(...c.chapters));
            const types = window.getUniqueValues('type');
            const batches = window.getUniqueValues('exam');

            const buildGroup = (label, category, opts) => `
                <details class="group bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700">
                    <summary class="p-4 font-bold text-slate-800 dark:text-white cursor-pointer flex justify-between items-center hover:text-brand-500 transition-colors">
                        ${label} <span class="text-slate-400 group-open:rotate-180 transition-transform">▼</span>
                    </summary>
                    <div class="space-y-2 max-h-48 overflow-y-auto custom-scrollbar px-2 pb-2 mt-1">
                        ${opts.map(opt => `<label class="flex items-start gap-3 p-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer transition-colors group"><input type="checkbox" value="${opt}" class="deck-filter-checkbox mt-1 w-4 h-4 text-brand-500 rounded bg-slate-50" data-category="${category}"><span class="text-sm font-medium text-slate-700 dark:text-slate-300">${opt}</span></label>`).join('')}
                    </div>
                </details>
            `;
            if(container) container.innerHTML = buildGroup('Chapters', 'chapter', chapters) + buildGroup('Type', 'type', types) + buildGroup('Exam Batch', 'batch', batches);
        };

        window.syncDeckWithFilters = function() {
            const getChecked = (cat) => Array.from(document.querySelectorAll(`.deck-filter-checkbox[data-category="${cat}"]:checked`)).map(cb => cb.value);
            const sChapters = getChecked('chapter'), sTypes = getChecked('type'), sBatches = getChecked('batch');
            const search = document.getElementById("searchInput").value.toLowerCase();
            
            window.activeDeckQuestions = window.displayData.filter(q => {
                let show = true;
                let text = (q.stem||"") + " " + (Array.isArray(q.chapter)?q.chapter.join(" "):q.chapter) + " " + (Array.isArray(q.examBatch)?q.examBatch.join(" "):q.examBatch);
                if (search && text.toLowerCase().indexOf(search) === -1) show = false;
                if (show && sTypes.length && !sTypes.includes(q.type)) show = false;
                if (show && sBatches.length) {
                    if (Array.isArray(q.examBatch)) { if (!q.examBatch.some(e => sBatches.includes(e))) show = false; }
                    else { if (!sBatches.includes(q.examBatch)) show = false; }
                }
                if (show && sChapters.length) {
                    const chArray = Array.isArray(q.chapter) ? q.chapter : [q.chapter];
                    if (!chArray.some(ch => sChapters.includes(ch))) show = false;
                }
                return show;
            });
            window.deckIndex = 0;
            const sub = document.getElementById('deck-subtitle');
            if(sub) sub.innerText = window.activeDeckQuestions.length > 0 ? `${window.activeDeckQuestions.length} Cards in Deck` : 'No cards match filters';
            window.renderDeckCard();
        };

        window.renderDeckCard = function() {
            const container = document.getElementById('deck-card-container');
            if (window.activeDeckQuestions.length === 0) {
                container.innerHTML = `<div class="deck-card glass-card flex flex-col items-center justify-center text-center p-8 h-full"><div class="text-5xl mb-4">📭</div><h3 class="text-xl font-bold text-slate-800 dark:text-white mb-2">Deck Empty</h3><p class="text-slate-500 dark:text-slate-400">Try adjusting your filters to see more cards.</p></div>`;
                return;
            }

            const q = window.activeDeckQuestions[window.deckIndex];
            const cleanStem = q.stem.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            document.getElementById('deck-topic-badge').innerText = q.q + " | " + q.type;

            let questionHtml = '', optsHtml = '';
            if (q.type === 'MCQ') {
                questionHtml = `<div class="mb-6"><h2 class="text-xl font-bold text-slate-900 dark:text-white leading-snug text-left">${cleanStem}</h2></div>`;
                if (q.options) {
                    optsHtml = `<div class="space-y-3 pb-6">${q.options.map((opt, i) => {
                        const letter = window.optionLetters[i];
                        const cleanOpt = opt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        const status = window.deckStatus[q.q];
                        let btnClass = "deck-option-btn group";
                        let disabledAttr = status ? "disabled" : "";
                        if (status && letter === q.ans_key) btnClass += " deck-opt-correct";
                        if (status && status === 'wrong' && letter === q.userAnswer) btnClass += " deck-opt-wrong";
                        return `<button onclick="window.checkDeckAnswer(this, '${letter}', '${q.ans_key}')" class="${btnClass}" ${disabledAttr}><div class="flex items-start gap-3"><span class="flex-shrink-0 w-7 h-7 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-500 text-sm font-bold flex items-center justify-center border border-slate-200 dark:border-slate-600 group-hover:bg-brand-500 group-hover:text-white transition-colors">${letter}</span><span class="text-slate-700 dark:text-slate-200 font-medium pt-0.5 text-left w-full">${cleanOpt}</span></div></button>`;
                    }).join('')}</div>`;
                }
            } else {
                questionHtml = `<div class="mb-6"><div class="theory-question shadow-sm dark:bg-dark-bg dark:text-brand-200 dark:border-brand-500 text-left"><span>${cleanStem}</span></div></div>`;
                optsHtml = `<div class="mt-auto pt-6 text-center"><button onclick="window.askAI(this, window.activeDeckQuestions[${window.deckIndex}])" class="bg-emerald-600 text-white font-bold py-3 px-8 rounded-xl shadow-md w-full mb-4">Explain via AI</button></div>`;
            }

            container.innerHTML = `<div class="deck-card glass-card">${questionHtml}${optsHtml}</div>`;
        };

        window.checkDeckAnswer = function(btn, selected, correct) {
            const q = window.activeDeckQuestions[window.deckIndex];
            q.userAnswer = selected;
            window.deckStatus[q.q] = selected === correct ? 'correct' : 'wrong';
            window.renderDeckCard();
        };

        window.deckNext = function() {
            if (window.deckIndex < window.activeDeckQuestions.length - 1) {
                window.deckIndex++; window.renderDeckCard();
            }
        };

        window.deckPrev = function() {
            if (window.deckIndex > 0) {
                window.deckIndex--; window.renderDeckCard();
            }
        };

        window.toggleDeckMode = function() {
            window.isDeckMode = !window.isDeckMode;
            const mainContent = document.getElementById('main-wrapper');
            const deck = document.getElementById('universal-deck-layer');
            
            if (window.isDeckMode) {
                mainContent.style.display = 'none';
                deck.style.display = 'flex';
                window.syncDeckWithFilters();
            } else {
                mainContent.style.display = 'block';
                deck.style.display = 'none';
            }
        };

        window.toggleDeckDrawer = function(type) {
            const nav = document.getElementById('deck-nav-drawer');
            const filt = document.getElementById('deck-filter-drawer');
            nav.classList.remove('open'); filt.classList.remove('open');
            
            if (type === 'nav') {
                const grid = document.getElementById('deck-nav-grid');
                grid.innerHTML = window.activeDeckQuestions.map((q, i) => {
                    let cls = "deck-nav-btn";
                    const status = window.deckStatus[q.q];
                    if (status === 'correct') cls += " correct";
                    if (status === 'wrong') cls += " wrong";
                    if (i === window.deckIndex) cls += " active";
                    return `<button onclick="window.deckIndex=${i}; window.toggleDeckDrawer(null); window.renderDeckCard();" class="${cls} border-none outline-none">${q.q}</button>`;
                }).join('');
                nav.classList.add('open');
            }
            if (type === 'filter') filt.classList.add('open');
        };

        window.resetDeckFilters = function() {
            document.querySelectorAll('.deck-filter-checkbox').forEach(cb => cb.checked = false);
            window.syncDeckWithFilters();
        };

        // --- Initialization ---
        window.onload = () => { 
            window.fetchQuestions(); 
        };
    </script>
</body>
</html>
