<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBBS Profs Prep - Central Portal</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50:'#f0f9ff', 100:'#e0f2fe', 200:'#bae6fd', 400:'#3395ff', 500:'#0ea5e9', 600:'#0284c7', 900:'#0c4a6e' },
                        accent: { yellow: '#ffc107', yellowHover: '#e0a800' },
                        dark: { bg: '#020617', surface: '#0f172a', border: '#1e293b' } 
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.3s ease-out forwards' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; }
        body { background-color: #f0f9ff; color: #0f172a; transition: background-color 0.3s ease, color 0.3s ease; }
        html.dark body { background-color: #020617 !important; color: #f8fafc !important; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 10px; }
        html.dark ::-webkit-scrollbar-track { background: #020617; }
        html.dark ::-webkit-scrollbar-thumb { background: #334155; border: 2px solid #020617; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; transition: opacity 0.5s ease; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px); border: 1px solid #e0f2fe; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        html.dark .glass-card { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e293b; color: #f1f5f9; }
        .glass-card:hover { transform: translateY(-5px); }
        html.dark .glass-card:hover { border-color: #3395ff; box-shadow: 0 10px 30px -5px rgba(51, 149, 255, 0.2); }
    </style>
</head>

<body class="bg-brand-50 text-slate-900 dark:bg-dark-bg transition-colors duration-300 relative flex flex-col min-h-screen">
    
    <script src="app-shell.js"></script>

    <div id="canvas-container"></div>

    <main class="relative z-10 pt-24 pb-20 w-full px-4 md:px-6 flex-1 max-w-7xl mx-auto">
        <div class="hidden mb-6 px-2 flex items-center text-xs md:text-sm font-medium text-slate-500 dark:text-slate-400 animate-fade-in flex-wrap" id="breadcrumbs">
            <span class="hover:text-brand-400 cursor-pointer transition-colors" onclick="window.app.goHome()">Home</span>
            <span class="mx-2">/</span>
            <span class="hover:text-brand-400 cursor-pointer text-brand-600 dark:text-brand-400 font-bold transition-colors" id="bc-institute">Institute</span>
            <span class="mx-2 hidden" id="bc-slash-1">/</span>
            <span class="text-slate-900 dark:text-white hidden" id="bc-year">Year</span>
        </div>

        <div id="app-container">
            <div class="animate-fade-in" id="view-institutes">
                <div class="text-center mb-10 mt-4">
                    <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight mb-3 text-slate-900 dark:text-white">Select Your <span class="text-transparent bg-clip-text bg-gradient-to-r from-brand-400 to-accent-yellow">Institute</span></h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm md:text-lg">Access PYQs for all medical colleges.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6" id="institutes-grid"></div>
            </div>

            <div class="hidden animate-fade-in" id="view-years">
                <div class="text-center mb-10 mt-4">
                    <h2 class="text-2xl md:text-3xl font-bold mb-2 text-slate-900 dark:text-white">Select Year</h2>
                    <p class="text-brand-500 dark:text-brand-400 font-semibold text-lg" id="selected-institute-name">Institute Name</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6" id="years-grid"></div>
            </div>

            <div class="hidden animate-fade-in" id="view-subjects">
                <div class="text-center mb-10 mt-4">
                    <h2 class="text-2xl md:text-3xl font-bold mb-2 text-slate-900 dark:text-white">Select Subject</h2>
                    <p class="text-slate-500 dark:text-slate-400"><span class="font-bold text-brand-500" id="selected-year-name">Year</span> • <span id="selected-inst-sub-name">Inst</span></p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6" id="subjects-grid"></div>
            </div>

            <div class="hidden animate-fade-in" id="view-resources">
                <div class="text-center mb-10 mt-4">
                    <h2 class="text-2xl md:text-3xl font-bold mb-2 text-slate-900 dark:text-white">Select Resource</h2>
                    <p class="text-brand-500 font-semibold text-lg" id="selected-resource-subject">Subject</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 max-w-4xl mx-auto" id="resources-grid"></div>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-brand-100 dark:border-slate-800 mt-auto py-8 bg-white dark:bg-dark-surface relative z-10">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-slate-500 dark:text-slate-400">
            <div>&copy; 2026 MBBS Profs Prep. All rights reserved.</div>
            <div class="flex gap-4 md:gap-6 font-medium flex-wrap justify-center">
                <a href="#" class="hover:text-brand-500 transition-colors">About Us</a>
                <a href="#" class="hover:text-brand-500 transition-colors">Contact</a>
                <a href="#" class="hover:text-brand-500 transition-colors">Terms & Conditions</a>
                <a href="#" class="hover:text-brand-500 transition-colors">Privacy Policy</a>
                <a href="#" class="hover:text-brand-500 transition-colors">Refunds</a>
            </div>
        </div>
    </footer>

    <button class="fixed bottom-6 left-6 z-[9990] w-14 h-14 bg-indigo-600 active:scale-90 text-white rounded-full shadow-2xl flex items-center justify-center transition-all border-2 border-white dark:border-slate-800 hover:scale-110" id="pdf-trigger-btn" onclick="window.pdfSmartApp.toggle()" style="display:none">
        <span class="text-2xl">📚</span>
    </button>

    <aside class="fixed top-0 left-0 h-full z-[10000] bg-white dark:bg-slate-950 shadow-2xl transform -translate-x-full transition-all duration-300 flex flex-col border-r border-slate-200 dark:border-slate-800 w-full md:w-[400px] lg:w-[450px]" id="pdf-smart-drawer">
        <div class="px-4 py-3 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-slate-50 dark:bg-slate-900 shrink-0">
            <div class="flex items-center gap-3">
                <button class="p-2 -ml-2 rounded-full hover:bg-slate-200 text-slate-600 dark:text-slate-300" onclick="window.pdfSmartApp.goBack()"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg></button>
                <h2 class="text-sm font-bold uppercase tracking-wider text-slate-900 dark:text-white" id="pdf-smart-title">Library</h2>
            </div>
            <button class="p-2 rounded-lg text-slate-400 hover:text-red-500 transition-colors" onclick="window.pdfSmartApp.close()"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/></svg></button>
        </div>
        <div class="flex-1 overflow-y-auto bg-slate-100 dark:bg-slate-950 p-3" id="pdf-smart-body"></div>
    </aside>
    <div class="fixed inset-0 z-[9995] bg-slate-900/50 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300 md:hidden" id="pdf-smart-backdrop" onclick="window.pdfSmartApp.close()"></div>

    <script>
        // GLOBALS required by app-shell.js
        window.globalUserStatus = { isVIP: false, daysLeft: 0, validUntil: null, expired: false };
        window.currentUserObj = null;
        window.currentUserProfileData = {}; 
        window.userBookmarks = {}; 

        window.DATA = {
            locks: ['delhi_2', 'delhi_3', 'delhi_4', 'kalyani_2', 'kalyani_3', 'kalyani_4'],
            institutes: [
                { id: 'delhi', name: 'AIIMS Delhi', city: 'New Delhi', badge: 'D', locked: false },
                { id: 'deoghar', name: 'AIIMS Deoghar', city: 'Jharkhand', badge: 'D', locked: false },
                { id: 'kalyani', name: 'AIIMS Kalyani', city: 'West Bengal', badge: 'K', locked: false },
                { id: 'bhopal', name: 'AIIMS Bhopal', city: 'Madhya Pradesh', badge: 'B', locked: true },
                { id: 'bhubaneswar', name: 'AIIMS Bhubaneswar', city: 'Odisha', badge: 'B', locked: true },
                { id: 'jodhpur', name: 'AIIMS Jodhpur', city: 'Rajasthan', badge: 'J', locked: true }
            ],
            years: [
                { id: '1', name: 'First Prof', sub: 'Anatomy • Physio • Biochem' },
                { id: '2', name: 'Second Prof', sub: 'Patho • Pharma • Micro • FMT' },
                { id: '3', name: 'Third Prof', sub: 'ENT • Ophthal • PSM • Psych • Ortho' },
                { id: '4', name: 'Final Prof', sub: 'Med • Surg • OBG • Peds • Derma • Anesth • Radio' }
            ],
            subjects: {
                '1': [ { name: 'Anatomy', icon: '🦴', id: 'anatomy' }, { name: 'Physiology', icon: '🧠', id: 'physiology' }, { name: 'Biochemistry', icon: '🧪', id: 'biochemistry' } ],
                '2': [ { name: 'Pathology', icon: '🔬', id: 'pathology' }, { name: 'Pharmacology', icon: '💊', id: 'pharmacology' }, { name: 'Microbiology', icon: '🦠', id: 'microbiology' }, { name: 'Forensic Medicine', icon: '⚖️', id: 'fmt' } ],
                '3': [ { name: 'ENT', icon: '👂', id: 'ent' }, { name: 'Ophthalmology', icon: '👁️', id: 'ophthalmology' }, { name: 'Community Medicine', icon: '🏘️', id: 'psm' }, { name: 'Psychiatry', icon: '🧠', id: 'psychiatry' }, { name: 'Orthopaedics', icon: '🦴', id: 'orthopaedics' } ],
                '4': [ { name: 'Medicine', icon: '🩺', id: 'medicine' }, { name: 'Surgery', icon: '🔪', id: 'surgery' }, { name: 'Obs & Gynae', icon: '👶', id: 'obg' }, { name: 'Pediatrics', icon: '🧸', id: 'pediatrics' }, { name: 'Dermatology', icon: '🧴', id: 'dermatology' }, { name: 'Anesthesia', icon: '💉', id: 'anesthesia' }, { name: 'Radiology', icon: '🩻', id: 'radiology' } ]
            },
            overrides: {
                'deoghar_obg': [{ label: 'Chapter Wise PYQ', url: 'obg-review.html?college=deoghar'}],
                'deoghar_pathology': [{ label: 'Pathology Database', url: 'https://drive.google.com/file/d/1QROuWBHkNNGVsSlBBrWuW0BuKW87m79Y/preview' }]
            }
        };

        window.app = {
            state: { view: 'institutes', inst: null, year: null, sub: null },
            init: function() { this.renderInstitutes(); },
            goHome: function() { this.state = { view: 'institutes', inst: null, year: null, sub: null }; this.renderInstitutes(); },
            goToYears: function(id, name) { this.state = { view: 'years', inst: { id, name }, year: null, sub: null }; this.renderYears(this.state.inst); },
            goToSubjects: function(id, name) { this.state.year = { id, name }; this.state.view = 'subjects'; this.renderSubjects(this.state.inst, this.state.year); },
            handleSubjectClick: function(sub) {
                const key = `${this.state.inst.id}_${sub.id}`;
                const links = window.DATA.overrides[key] || [{ label: `${sub.name} Bank`, url: `#` }];
                this.state.sub = sub; this.state.view = 'resources';
                this.renderResources(this.state.inst, this.state.year, sub, links);
            },
            showLockedModal: function(name) { alert(`Bank for ${name} is coming soon!`); },
            
            renderInstitutes: function() {
                this.toggleView('institutes');
                document.getElementById('institutes-grid').innerHTML = window.DATA.institutes.map(inst => {
                    if (inst.locked) {
                        return `
                            <div onclick="window.app.showLockedModal('${inst.name}')" class="glass-card p-6 rounded-xl relative opacity-75 grayscale bg-slate-100 dark:bg-slate-800/50">
                                <div class="absolute top-3 right-3 bg-slate-200 text-slate-500 text-[10px] font-bold px-2 py-1 rounded-full">Soon</div>
                                <div class="w-12 h-12 rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-400 flex items-center justify-center font-bold text-lg mb-4 border border-slate-300">${inst.badge}</div>
                                <h3 class="font-bold text-lg mb-1 text-slate-500">${inst.name}</h3>
                                <p class="text-sm text-slate-400">${inst.city}</p>
                            </div>`;
                    }
                    return `
                        <div onclick="window.app.goToYears('${inst.id}', '${inst.name}')" class="glass-card p-6 rounded-xl cursor-pointer hover:scale-[1.02] transition-transform group">
                            <div class="flex justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg bg-brand-50 text-brand-400 flex items-center justify-center font-bold text-lg dark:bg-brand-900/30">${inst.badge}</div>
                                <span class="text-slate-300 group-hover:text-accent-yellow transition-colors">↗</span>
                            </div>
                            <h3 class="font-bold text-lg mb-1 text-slate-900 dark:text-white group-hover:text-brand-500 transition-colors">${inst.name}</h3>
                            <p class="text-sm text-slate-500 dark:text-slate-400">${inst.city}</p>
                        </div>`;
                }).join('');
                this.updateBreadcrumbs();
            },
            
            renderYears: function(inst) {
                this.toggleView('years');
                document.getElementById('selected-institute-name').innerText = inst.name;
                document.getElementById('years-grid').innerHTML = window.DATA.years.map(year => {
                    if (window.DATA.locks.includes(`${inst.id}_${year.id}`)) {
                        return `<div onclick="window.app.showLockedModal('${year.name}')" class="glass-card p-8 rounded-2xl relative opacity-70 grayscale bg-slate-100 dark:bg-slate-800/50 cursor-not-allowed"><div class="absolute top-4 right-4 bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 text-[10px] font-bold px-2 py-1 rounded-full uppercase">Soon</div><div class="text-5xl font-black text-slate-300 dark:text-slate-600 mb-4">0${year.id}</div><h3 class="text-2xl font-bold mb-2 text-slate-500 dark:text-slate-400">${year.name}</h3></div>`;
                    }
                    return `<div onclick="window.app.goToSubjects('${year.id}', '${year.name}')" class="glass-card p-8 rounded-2xl cursor-pointer hover:border-t-brand-400 border-t-4 border-transparent transition-all group"><div class="text-5xl font-black text-brand-100 dark:text-brand-900/40 mb-4 group-hover:text-brand-300 transition-colors">0${year.id}</div><h3 class="text-2xl font-bold mb-2 text-slate-900 dark:text-white group-hover:text-brand-400 transition-colors">${year.name}</h3><p class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wide">${year.sub}</p></div>`;
                }).join('');
                this.updateBreadcrumbs();
            },
            
            renderSubjects: function(inst, year) {
                this.toggleView('subjects');
                document.getElementById('selected-year-name').innerText = year.name;
                document.getElementById('selected-inst-sub-name').innerText = inst.name;
                document.getElementById('subjects-grid').innerHTML = window.DATA.subjects[year.id].map(sub => {
                    return `<div onclick="window.app.handleSubjectClick({id:'${sub.id}', name:'${sub.name}'})" class="glass-card p-6 rounded-xl cursor-pointer group flex items-center gap-4 hover:border-accent-yellow transition-all"><div class="text-4xl group-hover:scale-110 transition-transform">${sub.icon}</div><div><h3 class="text-xl font-bold text-slate-900 dark:text-white transition-colors group-hover:text-accent-yellow">${sub.name}</h3><p class="text-xs text-slate-400 dark:text-slate-500 font-bold uppercase tracking-widest mt-1">Open ➝</p></div></div>`;
                }).join('');
                this.updateBreadcrumbs();
            },
            
            renderResources: function(inst, year, sub, links) {
                this.toggleView('resources');
                document.getElementById('selected-resource-subject').innerText = `${sub.name} (${inst.name})`;
                document.getElementById('resources-grid').innerHTML = links.map(link => {
                    return `<a href="${link.url}" class="glass-card p-6 rounded-xl flex items-center justify-between group"><span class="font-bold text-lg text-slate-900 dark:text-white transition-colors group-hover:text-brand-400">${link.label}</span><span class="text-slate-300 dark:text-slate-600 group-hover:text-brand-400 font-bold text-xl">↗</span></a>`;
                }).join('');
                this.updateBreadcrumbs();
            },
            
            toggleView: function(viewId) {
                ['institutes', 'years', 'subjects', 'resources'].forEach(v => {
                    const el = document.getElementById(`view-${v}`);
                    if (v === viewId) { el.classList.remove('hidden'); el.classList.add('animate-fade-in'); } 
                    else { el.classList.add('hidden'); el.classList.remove('animate-fade-in'); }
                });
            },
            
            updateBreadcrumbs: function() {
                const bc = document.getElementById('breadcrumbs');
                if (this.state.view === 'institutes') { bc.classList.add('hidden'); } 
                else {
                    bc.classList.remove('hidden'); document.getElementById('bc-institute').innerText = this.state.inst.name;
                    const isSub = (this.state.view === 'subjects' || this.state.view === 'resources');
                    if (isSub) { document.getElementById('bc-slash-1').classList.remove('hidden'); document.getElementById('bc-year').classList.remove('hidden'); document.getElementById('bc-year').innerText = this.state.year.name; } 
                    else { document.getElementById('bc-slash-1').classList.add('hidden'); document.getElementById('bc-year').classList.add('hidden'); }
                }
            }
        };

        // --- PDF SMART APP LOGIC ---
        window.PDF_SMART_DB = {
            "AIIMS Deoghar": {
                "Pathology": "https://drive.google.com/file/d/1QROuWBHkNNGVsSlBBrWuW0BuKW87m79Y/preview",
                "CFM": "https://docs.google.com/document/d/1FxoWgI71WdNPrM8WSf1yAPPeeZhT4f9KuGvwaY779mE/edit?usp=drivesdk"
            }
        };

        window.pdfSmartApp = {
            isOpen: false, stack: [],
            els: { drawer: document.getElementById('pdf-smart-drawer'), backdrop: document.getElementById('pdf-smart-backdrop'), body: document.getElementById('pdf-smart-body'), trigger: document.getElementById('pdf-trigger-btn'), title: document.getElementById('pdf-smart-title') },
            checkVisibility: function() { const isVIP = window.globalUserStatus.isVIP; this.els.trigger.style.display = isVIP ? 'flex' : 'none'; if(!isVIP && this.isOpen) this.close(); },
            toggle: function() { this.isOpen ? this.close() : this.open(); },
            open: function() { this.isOpen = true; this.els.drawer.classList.remove('-translate-x-full'); this.els.backdrop.classList.remove('opacity-0', 'pointer-events-none'); if(this.stack.length === 0) this.renderHome(); },
            close: function() { this.isOpen = false; this.els.drawer.classList.add('-translate-x-full'); this.els.backdrop.classList.add('opacity-0', 'pointer-events-none'); },
            goBack: function() { if(this.stack.length > 1) { this.stack.pop(); this.renderList(this.stack[this.stack.length-1].val, false); } else { this.close(); } },
            renderHome: function(push=true) {
                if(push) this.stack.push({type:'home'}); this.els.title.innerText="Library";
                this.els.body.innerHTML = Object.keys(window.PDF_SMART_DB).map(name => `<div onclick="window.pdfSmartApp.renderList('${name}')" class="p-4 mb-2 bg-white rounded-xl shadow-sm border border-slate-200 flex justify-between cursor-pointer font-bold dark:bg-slate-900 dark:border-slate-800 dark:text-white hover:border-brand-500 transition-colors">${name} <span class="text-brand-500">➝</span></div>`).join('');
            },
            renderList: function(col, push=true) {
                if(push) this.stack.push({type:'list', val:col}); this.els.title.innerText=col;
                this.els.body.innerHTML = Object.entries(window.PDF_SMART_DB[col]).map(([sub, url]) => `<div onclick="window.pdfSmartApp.renderViewer('${url}')" class="p-3 mb-2 bg-white rounded-xl shadow-sm border border-slate-200 cursor-pointer font-bold dark:bg-slate-900 dark:border-slate-800 dark:text-white text-slate-800 hover:border-brand-500 transition-colors">📄 ${sub}</div>`).join('');
            },
            renderViewer: function(url) {
                let fUrl = url.includes('drive.google') ? url.replace(/\/view.*/, '/preview').replace(/\/edit.*/, '/preview') : url;
                this.stack.push({type:'viewer'}); this.els.title.innerText="Viewing";
                this.els.body.innerHTML = `<iframe src="${fUrl}" class="w-full h-full rounded-xl bg-white border dark:border-slate-800" frameborder="0"></iframe>`;
            }
        };

        window.init3D = function() {
            const container = document.getElementById('canvas-container');
            if(!container) return;
            const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000); camera.position.z = 40;
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); container.appendChild(renderer.domElement);
            const group = new THREE.Group(); scene.add(group); const geo = new THREE.SphereGeometry(0.3, 8, 8);
            let mb = new THREE.MeshBasicMaterial({ color: 0x3395ff }), my = new THREE.MeshBasicMaterial({ color: 0xffc107 });
            for(let i=0; i<150; i++) { const a=i*0.4; group.add(new THREE.Mesh(geo, i%4===0?my:mb).translateOnAxis(new THREE.Vector3((i*0.8)-60, Math.sin(a)*8, Math.cos(a)*8),1)); }
            (function animate() { requestAnimationFrame(animate); group.rotation.x+=0.002; renderer.render(scene, camera); })();
            window.update3D = () => container.style.opacity = document.documentElement.classList.contains('dark') ? 0.1 : 0.6;
            window.update3D();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark'); const icon = document.getElementById('theme-icon'); if(icon) icon.innerText = '☀️'; }
            window.init3D(); window.app.init(); 
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvPdEhkK1VDkuAqIhlSXPL2MXxlv7Mo9c",
            authDomain: "mbbs-profs-prep48c.firebaseapp.com",
            databaseURL: "https://mbbs-profs-prep48c-default-rtdb.firebaseio.com",
            projectId: "mbbs-profs-prep48c",
            storageBucket: "mbbs-profs-prep48c.firebasestorage.app",
            messagingSenderId: "378639777472",
            appId: "1:378639777472:web:9c2dcb689d97025f6ff725"
        };
        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getDatabase(fbApp);
        window.db = db;

        const allowedVIPs = [ "pankajmahto109@gmail.com", "educateindiainstitute@gmail.com", "indrajeet91434@gmail.com", "pankajkumarmahto1009@gmail.com" ];

        window.deleteBookmark = async function(qId) {
            if (!window.currentUserObj) return;
            if (!confirm("Remove this question from your saved items?")) return;
            try { await set(ref(db, `users/${window.currentUserObj.uid}/bookmarks/${qId}`), null); } 
            catch(e) { alert("Failed to remove bookmark: " + e.message); }
        };

        window.saveEditedProfile = async function(btn) {
            const name = document.getElementById('edit-name').value.trim(); const joinYear = document.getElementById('edit-join-year').value; const college = document.getElementById('edit-college').value.trim(); const city = document.getElementById('edit-city').value.trim(); const phone = document.getElementById('edit-phone').value.trim();
            if (!name) return alert("Name is required!");
            const originalText = btn.innerText; btn.disabled = true; btn.innerText = "Saving...";
            try {
                await update(ref(db, 'users/' + window.currentUserObj.uid + '/profile'), { fullName: name, joinYear: joinYear, college: college, city: city, phone: phone });
                if (window.currentUserObj.displayName !== name) { await updateProfile(window.currentUserObj, { displayName: name }); }
                btn.innerText = "Saved!"; btn.classList.replace('bg-brand-500', 'bg-green-500');
                setTimeout(() => { btn.innerText = originalText; btn.classList.replace('bg-green-500', 'bg-brand-500'); btn.disabled = false; window.userPanelApp.setView('menu'); }, 1000);
            } catch(e) { alert(e.message); btn.disabled = false; btn.innerText = originalText; }
        };

        window.handleEmailLogin = (btn) => {
            const e = document.getElementById('login-email').value; const p = document.getElementById('login-pass').value;
            if(!e || !p) return window.showAuthError("Email/Pass required");
            const originalText = btn.innerText; btn.disabled = true; btn.innerText = "Verifying...";
            signInWithEmailAndPassword(auth, e, p).catch(err => { btn.disabled = false; btn.innerText = originalText; window.showAuthError(err.message); });
        };

        window.handleEmailSignUp = async (btn) => {
            const n = document.getElementById('reg-name').value; const e = document.getElementById('reg-email').value; const p = document.getElementById('reg-pass').value; const j = document.getElementById('reg-join-year').value; const c = document.getElementById('reg-college').value; const cy = document.getElementById('reg-country') ? document.getElementById('reg-country').value : "India"; const city = document.getElementById('reg-city').value; const phone = document.getElementById('reg-phone').value;
            if(!n || !e || !p || !c || !cy || !j) return window.showAuthError("Please fill all mandatory fields.");
            if(p.length < 6) return window.showAuthError("Password must be at least 6 characters.");
            const originalText = btn.innerText; btn.disabled = true; btn.innerText = "Creating Profile...";
            try {
                const uc = await createUserWithEmailAndPassword(auth, e, p);
                await updateProfile(uc.user, { displayName: n });
                await set(ref(db, 'users/' + uc.user.uid + '/profile'), { fullName: n, email: e, joinYear: j, college: c, country: cy, city: city || "Not provided", phone: phone || "Not provided", createdAt: new Date().toISOString() });
            } catch(err) { btn.disabled = false; btn.innerText = originalText; window.showAuthError(err.message); }
        };

        window.handleForgotPass = () => {
            const e = document.getElementById('login-email').value;
            if(!e) return window.showAuthError("Enter email first");
            sendPasswordResetEmail(auth, e).then(() => {
                const errDiv = document.getElementById('auth-error-msg'); errDiv.innerText = "Reset link sent! Check your inbox."; errDiv.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'border-red-200'); errDiv.classList.add('bg-green-50', 'text-green-600', 'border-green-200');
            }).catch(err => window.showAuthError(err.message));
        };

        window.firebaseSignOut = () => signOut(auth).then(() => window.location.reload());

        onAuthStateChanged(auth, (user) => {
            window.currentUserObj = user;
            if (user) {
                const email = user.email.toLowerCase().trim();
                onValue(ref(db, 'users/' + user.uid + '/profile'), (s) => { window.currentUserProfileData = s.val() || {}; if(window.userPanelApp && window.userPanelApp.isOpen && window.userPanelApp.viewMode !== 'bookmarks') window.userPanelApp.renderState(); });
                onValue(ref(db, 'users/' + user.uid + '/bookmarks'), (snapshot) => { window.userBookmarks = snapshot.exists() ? snapshot.val() : {}; if(window.userPanelApp && window.userPanelApp.isOpen && window.userPanelApp.viewMode === 'bookmarks') window.userPanelApp.renderState(); });

                if (allowedVIPs.includes(email)) {
                    window.globalUserStatus = { isVIP: true, daysLeft: 999, validUntil: 'Lifetime Access', expired: false };
                    if(window.userPanelApp && window.userPanelApp.isOpen && window.userPanelApp.viewMode === 'menu') window.userPanelApp.renderState();
                    if(window.pdfSmartApp) window.pdfSmartApp.checkVisibility();
                } else {
                    onValue(ref(db, 'users/' + user.uid + '/subscription'), (s) => {
                        let sub = { isVIP: false, daysLeft: 0, validUntil: null, expired: false };
                        if (s.exists()) {
                            const d = s.val(); const today = new Date(); today.setHours(0,0,0,0); const exp = new Date(d.validUntil); exp.setHours(0,0,0,0);
                            const diff = Math.ceil((exp - today) / 86400000);
                            if (diff >= 0 && d.status === "active") sub = { isVIP: true, daysLeft: diff, validUntil: d.validUntil, expired: false };
                            else sub = { isVIP: false, daysLeft: diff, validUntil: d.validUntil, expired: true };
                        }
                        window.globalUserStatus = sub; 
                        if(window.userPanelApp && window.userPanelApp.isOpen && window.userPanelApp.viewMode === 'menu') window.userPanelApp.renderState();
                        if(window.pdfSmartApp) window.pdfSmartApp.checkVisibility();
                    });
                }
            } else { 
                window.currentUserProfileData = {}; window.userBookmarks = {}; window.globalUserStatus = { isVIP: false, daysLeft: 0 }; 
                if(window.userPanelApp && window.userPanelApp.isOpen) window.userPanelApp.renderState(); 
                if(window.pdfSmartApp) window.pdfSmartApp.checkVisibility();
            }
        });
    </script>
</body>
</html>
