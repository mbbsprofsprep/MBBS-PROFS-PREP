                                <a href="${window.subApp.purchaseUrl}" class="flex items-center gap-3 p-3 rounded-xl hover:bg-brand-50 dark:hover:bg-slate-800 text-slate-700 dark:text-slate-300 font-semibold transition-colors group">
                                    <span class="w-8 h-8 rounded-lg bg-brand-100 dark:bg-slate-700 flex items-center justify-center text-brand-600 dark:text-brand-400 group-hover:scale-110 transition-transform">💳</span> Subscription Plan

                        this.els.footer.innerHTML = `

                            </button>`;
                    });
                } else {
                    // Not Logged In
                    this.els.body.innerHTML = `
                        <div class="flex flex-col items-center justify-center p-8 text-center h-full">
                            <div class="w-24 h-24 bg-brand-50 dark:bg-slate-800 rounded-full flex items-center justify-center mb-6 text-4xl shadow-inner border border-brand-100 dark:border-slate-700">👋</div>
                            <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Welcome to MBBS PROFS PREP</h3>
                            <p class="text-sm text-slate-500 dark:text-slate-400 mb-8">Sign in to sync your progress and access premium modules.</p>
                            <button onclick="window.firebaseSignIn()" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-600/30 transition-all active:scale-95 flex items-center justify-center gap-3">
                                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                                Continue with Google
                            </button>
                        </div>`;
                    this.els.footer.innerHTML = ``;
                }
            }
        };

        const app = {
            state: { view: 'institutes', inst: null, year: null, sub: null },
            init: function() { this.renderInstitutes(); },
            
            goHome: function() { this.state = { view: 'institutes', inst: null, year: null, sub: null }; this.renderInstitutes(); },
            goToYears: function(id, name) { this.state = { view: 'years', inst: { id, name }, year: null, sub: null }; this.renderYears(this.state.inst); },
            goToSubjects: function(id, name) { this.state.year = { id, name }; this.state.view = 'subjects'; this.renderSubjects(this.state.inst, this.state.year); },
            
            handleSubjectClick: function(sub) {
                const key = `${this.state.inst.id}_${sub.id}`;
                const links = DATA.overrides[key] || [{ label: `${sub.name} Database`, url: `#` }];
                this.state.sub = sub; this.state.view = 'resources';
                this.renderResources(this.state.inst, this.state.year, sub, links);
            },
            showLockedModal: function(name) { alert(`Content for ${name} is coming soon!`); },

            renderInstitutes: function() {
                this.toggleView('institutes');
                document.getElementById('institutes-grid').innerHTML = DATA.institutes.map(inst => {
                    if (inst.locked) return `<div onclick="app.showLockedModal('${inst.name}')" class="glass-card p-6 rounded-xl relative opacity-75 grayscale bg-slate-100 dark:bg-slate-800/50"><div class="absolute top-3 right-3 bg-slate-200 text-slate-500 dark:text-slate-400 text-[10px] font-bold px-2 py-1 rounded-full uppercase dark:bg-slate-700">Soon</div><div class="w-12 h-12 rounded-lg bg-slate-200 dark:bg-slate-700 text-slate-400 dark:text-slate-500 flex items-center justify-center font-bold text-lg mb-4 border border-slate-300 dark:border-slate-600">${inst.badge}</div><h3 class="font-bold text-lg mb-1 text-slate-500 dark:text-slate-400">${inst.name}</h3><p class="text-sm text-slate-400 dark:text-slate-500">${inst.city}</p></div>`;
                    return `<div onclick="app.goToYears('${inst.id}', '${inst.name}')" class="glass-card p-6 rounded-xl cursor-pointer group hover:scale-[1.02] transition-transform"><div class="flex justify-between mb-4"><div class="w-12 h-12 rounded-lg bg-brand-50 text-brand-400 flex items-center justify-center font-bold text-lg dark:bg-brand-900/30 dark:border dark:border-brand-800">${inst.badge}</div><span class="text-slate-300 group-hover:text-accent-yellow dark:text-slate-600">↗</span></div><h3 class="font-bold text-lg mb-1 group-hover:text-brand-400 text-slate-900 dark:text-white">${inst.name}</h3><p class="text-sm text-slate-500 dark:text-slate-400">${inst.city}</p></div>`;
                }).join('');
                this.updateBreadcrumbs();
            },

            renderYears: function(inst) {
                this.toggleView('years');
                document.getElementById('selected-institute-name').innerText = inst.name;
                
                document.getElementById('years-grid').innerHTML = DATA.years.map(year => {
                    if (year.locked || (DATA.locks && DATA.locks.includes(`${inst.id}_${year.id}`))) return `<div onclick="app.showLockedModal('${year.name}')" class="glass-card p-8 rounded-2xl relative opacity-70 grayscale bg-slate-100 dark:bg-slate-800/50 cursor-not-allowed"><div class="absolute top-4 right-4 bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 text-[10px] font-bold px-2 py-1 rounded-full uppercase">Soon</div><div class="text-5xl font-black text-slate-300 dark:text-slate-600 mb-4">0${year.id}</div><h3 class="text-2xl font-bold mb-2 text-slate-500 dark:text-slate-400">${year.name}</h3><p class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase">${year.sub}</p></div>`;
                    return `<div onclick="app.goToSubjects('${year.id}', '${year.name}')" class="glass-card p-8 rounded-2xl cursor-pointer group hover:border-t-brand-400 border-t-4 border-transparent"><div class="text-5xl font-black text-brand-100 dark:text-brand-900/40 mb-4 group-hover:text-brand-400/20 transition-colors">0${year.id}</div><h3 class="text-2xl font-bold mb-2 group-hover:text-brand-400 text-slate-900 dark:text-white">${year.name}</h3><p class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wide">${year.sub}</p></div>`;
                }).join('');
                this.updateBreadcrumbs();
            },

            renderSubjects: function(inst, year) {
                this.toggleView('subjects');
                document.getElementById('selected-year-name').innerText = year.name;
                document.getElementById('selected-inst-sub-name').innerText = inst.name;
                document.getElementById('subjects-grid').innerHTML = DATA.subjects[year.id].map(sub => {
                    if (sub.locked || (DATA.locks && DATA.locks.includes(`${inst.id}_${sub.id}`))) return `<div onclick="app.showLockedModal('${sub.name}')" class="glass-card p-6 rounded-xl relative opacity-70 grayscale flex items-center gap-4 bg-slate-100 dark:bg-slate-800/50 cursor-not-allowed"><div class="absolute top-2 right-2 bg-slate-200 dark:bg-slate-700 text-slate-500 dark:text-slate-400 text-[10px] font-bold px-2 py-1 rounded-full uppercase">Soon</div><div class="text-4xl opacity-50">${sub.icon}</div><div><h3 class="text-xl font-bold text-slate-500 dark:text-slate-400">${sub.name}</h3></div></div>`;
                    return `<div onclick="app.handleSubjectClick({id:'${sub.id}', name:'${sub.name}'})" class="glass-card p-6 rounded-xl cursor-pointer group flex items-center gap-4 hover:border-accent-yellow"><div class="text-4xl group-hover:scale-110 transition-transform">${sub.icon}</div><div><h3 class="text-xl font-bold group-hover:text-accent-yellow text-slate-900 dark:text-white transition-colors">${sub.name}</h3><p class="text-xs text-slate-400 dark:text-slate-500 font-bold uppercase">Open ➝</p></div></div>`;
                }).join('');
                this.updateBreadcrumbs();
            },

            renderResources: function(inst, year, sub, links) {
                this.toggleView('resources');
                document.getElementById('selected-resource-subject').innerText = `${sub.name} (${inst.name})`;
                document.getElementById('resources-grid').innerHTML = links.map(link => {
                    const isPDF = link.url.includes('drive.google.com') || link.url.includes('.pdf');
                    const finalUrl = isPDF ? `viewer.html?title=${encodeURIComponent(link.label)}&url=${encodeURIComponent(link.url)}` : link.url;
                    return `<a href="${finalUrl}" class="glass-card p-6 rounded-xl cursor-pointer group flex items-center justify-between hover:border-brand-400"><span class="font-bold text-lg group-hover:text-brand-400 text-slate-900 dark:text-white transition-colors">${link.label}</span><span class="text-slate-300 dark:text-slate-600 group-hover:text-brand-400">↗</span></a>`;
                }).join('');
                this.updateBreadcrumbs();
            },

            toggleView: function(viewId) {
                ['institutes', 'years', 'subjects', 'resources'].forEach(v => {
                    const el = document.getElementById(`view-${v}`);
                    if (v === viewId) { el.classList.remove('hidden'); el.classList.add('animate-fade-in'); } 
                    else { el.classList.add('hidden'); el.classList.remove('animate-fade-in'); }
                });
            },

            updateBreadcrumbs: function() {
                const bc = document.getElementById('breadcrumbs');
                if (this.state.view === 'institutes') { bc.classList.add('hidden'); } 
                else {
                    bc.classList.remove('hidden'); 
                    document.getElementById('bc-institute').innerText = this.state.inst.name;
                    if (this.state.view === 'subjects' || this.state.view === 'resources') { 
                        document.getElementById('bc-slash-1').classList.remove('hidden'); 
                        const yr = document.getElementById('bc-year');
                        yr.classList.remove('hidden'); yr.innerText = this.state.year.name; 
                    } else { 
                        document.getElementById('bc-slash-1').classList.add('hidden'); 
                        document.getElementById('bc-year').classList.add('hidden'); 
                    }
                }
            }
        };

        const PDF_SMART_DB = {
            "AIIMS Deoghar": {
                "Pathology": "https://drive.google.com/file/d/1QROuWBHkNNGVsSlBBrWuW0BuKW87m79Y/preview",
                "CFM": "https://docs.google.com/document/d/1FxoWgI71WdNPrM8WSf1yAPPeeZhT4f9KuGvwaY779mE/edit?usp=drivesdk"
            }
        };

        const pdfSmartApp = {
            isOpen: false, stack: [],
            els: { drawer: document.getElementById('pdf-smart-drawer'), backdrop: document.getElementById('pdf-smart-backdrop'), body: document.getElementById('pdf-smart-body'), trigger: document.getElementById('pdf-trigger-btn'), title: document.getElementById('pdf-smart-title') },
            
            init: function() { setInterval(() => this.checkVisibility(), 1500); },
            checkVisibility: function() {
                const email = localStorage.getItem('medqs_user_email');
                // Automatically uses subApp keys as the allowed list!
                const isVIP = email && Object.keys(window.subApp.database).includes(email.toLowerCase().trim());
                this.els.trigger.style.display = isVIP ? 'flex' : 'none';
                if(!isVIP && this.isOpen) this.close();
            },
            toggle: function() { this.isOpen ? this.close() : this.open(); },
            open: function() { this.isOpen = true; this.els.drawer.classList.remove('-translate-x-full'); this.els.backdrop.classList.remove('opacity-0', 'pointer-events-none'); if(this.stack.length===0) this.renderHome(); },
            close: function() { this.isOpen = false; this.els.drawer.classList.add('-translate-x-full'); this.els.backdrop.classList.add('opacity-0', 'pointer-events-none'); },
            goBack: function() { if(this.stack.length > 1) { this.stack.pop(); this.renderList(this.stack[this.stack.length-1].val, false); } else this.close(); },
            renderHome: function(push=true) {
                if(push) this.stack.push({type:'home'}); this.els.title.innerText="Library";
                this.els.body.innerHTML = Object.keys(PDF_SMART_DB).map(name => `<div onclick="pdfSmartApp.renderList('${name}')" class="p-4 mb-2 bg-white rounded-xl shadow-sm border border-slate-200 flex justify-between cursor-pointer font-bold dark:bg-slate-900 dark:border-slate-800 dark:text-white">${name} ➝</div>`).join('');
            },
            renderList: function(col, push=true) {
                if(push) this.stack.push({type:'list', val:col}); this.els.title.innerText=col;
                this.els.body.innerHTML = Object.entries(PDF_SMART_DB[col]).map(([sub, url]) => `<div onclick="pdfSmartApp.renderViewer('${url}')" class="p-3 mb-2 bg-white rounded-xl shadow-sm border border-slate-200 cursor-pointer font-bold dark:bg-slate-900 dark:border-slate-800 dark:text-white text-slate-800">📄 ${sub}</div>`).join('');
            },
            renderViewer: function(url) {
                let fUrl = url.includes('drive.google') ? url.replace(/\/view.*/, '/preview').replace(/\/edit.*/, '/preview') : url;
                this.stack.push({type:'viewer'}); this.els.title.innerText="Viewing";
                this.els.body.innerHTML = `<iframe src="${fUrl}" class="w-full h-full rounded-xl bg-white border dark:border-slate-800" frameborder="0"></iframe>`;
            }
        };

        function init3D() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene(); const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000); camera.position.z = 40;
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); container.appendChild(renderer.domElement);
            const group = new THREE.Group(); scene.add(group); const geo = new THREE.SphereGeometry(0.3, 8, 8);
            let mb = new THREE.MeshBasicMaterial({ color: 0x3395ff }), my = new THREE.MeshBasicMaterial({ color: 0xffc107 });
            for(let i=0; i<150; i++) { const a=i*0.4; group.add(new THREE.Mesh(geo, i%4===0?my:mb).translateOnAxis(new THREE.Vector3((i*0.8)-60, Math.sin(a)*8, Math.cos(a)*8),1)); }
            (function animate() { requestAnimationFrame(animate); group.rotation.x+=0.002; renderer.render(scene, camera); })();
            window.update3D = () => container.style.opacity = document.documentElement.classList.contains('dark') ? 0.1 : 0.6;
            window.update3D();
        }

        function toggleTheme() {
            const d = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', d?'dark':'light');
            document.getElementById('theme-icon').innerText = d?'☀️':'🌙'; if(window.update3D) window.update3D();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('theme') === 'dark') { document.documentElement.classList.add('dark'); document.getElementById('theme-icon').innerText = '☀️'; }
            init3D(); 
            app.init(); 
            pdfSmartApp.init();
            userPanelApp.renderState(); // Render Guest/User State
        });
    </script>
