        // --- FETCH DYNAMIC JSON LOGIC ---
        window.fetchQuestions = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const collegeCode = urlParams.get('college') || 'deoghar'; 
            
            const tableBody = document.getElementById('tableBody');
            if(tableBody) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-slate-500 dark:text-slate-400"><div class="w-8 h-8 border-4 border-brand-200 border-t-brand-500 rounded-full animate-spin mx-auto mb-3"></div><p class="font-bold">Downloading Question Bank...</p></td></tr>`;
            }

            try {
                const response = await fetch(`obg_aiims_${collegeCode}_data.json`);
                if (!response.ok) throw new Error("Failed to load JSON file");
                
                const data = await response.json();
                window.COLLEGE_NAME = data.collegeName || "AIIMS";
                window.curriculumData = data.curriculumData || [];
                window.qnaData = data.qnaData || [];
                window.isDataLoaded = true;

                document.getElementById('dynamic-page-title').innerText = `MBBS PROFS PREP - OBG Review (${window.COLLEGE_NAME})`;
                const headerEl = document.getElementById('dynamic-college-header');
                if(headerEl) headerEl.innerText = window.COLLEGE_NAME;

            } catch (error) {
                console.error("Error fetching data:", error);
                if(tableBody) tableBody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-red-500"><p class="font-bold text-lg">⚠️ Failed to load questions.</p><p class="text-sm">Please check your internet connection or the URL parameter.</p></td></tr>`;
            }
        };

        window.getUnitForChapter = function(chapterName) {
            for (const section of window.curriculumData) {
                if (section.chapters.includes(chapterName)) return section.unit;
            }
            return "";
        };

        window.processDataForAccess = function() {
            if (!window.isDataLoaded) return; 

            // Calculate active displayData based on access level
            if (window.accessLevel === 'premium') {
                window.displayData = [...window.qnaData];
            } else if (window.accessLevel === 'free') {
                const theoryQs = window.qnaData.filter(q => q.type === 'Theory').slice(0, 10);
                const mcqQs = window.qnaData.filter(q => q.type === 'MCQ').slice(0, 10);
                window.displayData = [...theoryQs, ...mcqQs];
            } else {
                window.displayData = [];
            }

            // Generate filters only AFTER data is calculated
            window.populateFilters(); 
            window.populateDeckFilters(); 

            // Paint UI
            window.populateTable();
            if (typeof window.syncDeckWithFilters === 'function') window.syncDeckWithFilters();

        // --- NATURAL SORTING + ARRAY FLATTENING ---
        window.getUniqueValues = function(key) {
            const values = new Set();
            if (key === 'chapter') {
                if (window.curriculumData) {
                    window.curriculumData.forEach(group => group.chapters.forEach(ch => values.add(ch)));
                }
                return Array.from(values).sort((a, b) => String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' }));
            } 
            
            window.qnaData.forEach(item => { 
                if (key === 'type' && item.type) {
                    values.add(item.type); 
                } else if (key === 'exam' && item.examBatch) {
                    if (Array.isArray(item.examBatch)) {
                        item.examBatch.forEach(e => values.add(e));
                    } else {
                        values.add(item.examBatch);
                    }
                } else if (item[key]) {
                    values.add(item[key]); 
                }
            });
            return Array.from(values).sort((a, b) => String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' }));
        }

        window.filterTable = function() {
            const searchText = document.getElementById("searchInput").value.toLowerCase();
            const table = document.getElementById("qnaTable");
            if(!table) return;
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                if (tr[i].getAttribute('data-locked-row') === "true") { tr[i].style.display = ""; continue; }
                const dataIndex = tr[i].getAttribute('data-index'); 
                const item = window.displayData[dataIndex];
                if(!item) continue;

                let showRow = true;
                if (searchText) {
                    let rowText = (tr[i].cells[1].textContent || "") + (tr[i].cells[3].textContent || "") + (tr[i].cells[4].textContent || "");
                    if (rowText.toLowerCase().indexOf(searchText) === -1) showRow = false;
                }
                
                if (showRow && window.filterState.types.size > 0 && !window.filterState.types.has(item.type)) showRow = false;
                
                if (showRow && window.filterState.chapters.size > 0 && !(item.chapter && item.chapter.some(ch => window.filterState.chapters.has(ch)))) showRow = false;
                
                if (showRow && window.filterState.exams.size > 0) {
                    let hasExamMatch = false;
                    if (Array.isArray(item.examBatch)) {
                        hasExamMatch = item.examBatch.some(e => window.filterState.exams.has(e));
                    } else {
                        hasExamMatch = window.filterState.exams.has(item.examBatch);
                    }
                    if (!hasExamMatch) showRow = false;
                }

                tr[i].style.display = showRow ? "" : "none";
            }
        }

        window.askAI = function(button, item) {
            let textToCopy; const cleanStem = item.stem.replace(/<[^>]*>/g, ""); const chapterString = item.chapter ? item.chapter.join(", ") : ""; 
            if (item.type === 'MCQ') {
                const optionsList = item.options ? item.options.map((opt, i) => `${window.optionLetters[i]}) ${opt}`).join('\n') : "Options not available";
                textToCopy = `I am studying for an OBG exam. Please explain this MCQ:\n\nQ: ${cleanStem}\nOpts:\n${optionsList}\nKey: ${item.ans_key}`;

            btn.innerText = "Saving...";
            
            try {
                await update(ref(db, 'users/' + window.currentUserObj.uid + '/profile'), { 
                    fullName: name, 
                    joinYear: joinYear, 
                    college: college, 
                    city: city, 
                    phone: phone 
                });
                
                if (window.currentUserObj.displayName !== name) {
                    await updateProfile(window.currentUserObj, { displayName: name });
                }
                
                btn.innerText = "Saved!";
                btn.classList.replace('bg-brand-500', 'bg-green-500');
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-green-500', 'bg-brand-500');
                    btn.disabled = false;
                    window.userPanelApp.setView('menu');
                }, 1000);
            } catch(e) { 
                alert(e.message); 
                btn.disabled = false; 
                btn.innerText = originalText; 
            }
        };

        window.handleEmailLogin = function(btn) {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            if(!email || !pass) return window.showAuthError("Please enter both email and password.");
            
            const originalText = btn.innerText; btn.innerText = "Verifying..."; btn.disabled = true;

            signInWithEmailAndPassword(auth, email, pass).catch(e => {
                btn.innerText = originalText; btn.disabled = false;
                window.showAuthError("Login failed: " + e.message);
            });
        };

        window.handleEmailSignUp = async function(btn) {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const joinYear = document.getElementById('reg-join-year').value.trim();
            const college = document.getElementById('reg-college').value.trim();
            const country = document.getElementById('reg-country').value.trim();
            const city = document.getElementById('reg-city').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            
            if(!name || !email || !pass || !college || !country || !joinYear) {
                return window.showAuthError("Please fill out all mandatory fields.");
            }
            if(pass.length < 6) return window.showAuthError("Password must be at least 6 characters.");
            
            const originalText = btn.innerText; btn.innerText = "Creating Profile..."; btn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(userCredential.user, { displayName: name });
                
                await set(ref(db, 'users/' + userCredential.user.uid + '/profile'), {
                    fullName: name, 
                    email: email, 
                    joinYear: joinYear, 
                    phone: phone || "Not provided", 
                    college: college, 
                    city: city || "Not provided", 
                    country: country, 
                    createdAt: new Date().toISOString()
                });
            } catch(e) {
                btn.innerText = originalText; btn.disabled = false;
                window.showAuthError(e.message);
            }
        };

        window.handleForgotPass = function() {
            const email = document.getElementById('login-email').value.trim();
            if(!email) return window.showAuthError("Enter your email in the box above.");
            sendPasswordResetEmail(auth, email).then(() => {
                document.getElementById('auth-error-msg').innerText = "Reset link sent!";
            }).catch(e => { window.showAuthError(e.message); });
        };

        window.firebaseSignOut = function() { signOut(auth).then(() => window.location.reload()); };

        window.executeBookmarkToggle = async function(qId, bookmarkData, isSaved) {
            const dbRef = ref(db, `users/${window.currentUserObj.uid}/bookmarks/${qId}`);
            if (isSaved) {
                await set(dbRef, null);
                window.showModal("Removed", `<p class="text-sm text-slate-500 dark:text-slate-400">Question removed from your cloud bookmarks.</p>`, `<button onclick="window.closeModal()" class="w-full py-2 bg-slate-200 dark:bg-slate-800 rounded-lg font-bold text-slate-700 dark:text-slate-300 border-none">Close</button>`, `🗑️`);
            } else {
                await set(dbRef, bookmarkData);
                window.showModal("Cloud Synced!", `<p class="text-sm text-slate-500 dark:text-slate-400">Question saved to your account. Access it from any device.</p>`, `<button onclick="window.closeModal()" class="w-full py-2 bg-brand-500 text-white rounded-lg font-bold border-none">Awesome</button>`, `☁️`);
            }
        };

        onAuthStateChanged(auth, (user) => {
            window.currentUserObj = user;
            
            const summaryBtn = document.getElementById('summaryButton');
            const allowedCoffeeUsers = ["pankajkumarmahto1009@gmail.com", "educateindiainstitute@gmail.com"];

            if (user) {
                const email = user.email.toLowerCase().trim();
                localStorage.setItem('medqs_user_email', email);
                
                if (summaryBtn) {
                    if (allowedCoffeeUsers.includes(email)) summaryBtn.style.display = 'inline-block';
                    else summaryBtn.style.display = 'none';
                }

                // Sync Profile Data
                onValue(ref(db, 'users/' + user.uid + '/profile'), (s) => { 
                    window.currentUserProfileData = s.val() || {}; 
                    if(window.userPanelApp.isOpen && window.userPanelApp.viewMode !== 'bookmarks') {
                        window.userPanelApp.renderState(); 
                    }
                });

                // Sync Bookmarks Data
                onValue(ref(db, 'users/' + user.uid + '/bookmarks'), (snapshot) => {
                    window.userBookmarks = snapshot.exists() ? snapshot.val() : {};
                    if (window.isDataLoaded) {
                        window.updateBookmarkUI(); 
                    }
                    if(window.userPanelApp.isOpen && window.userPanelApp.viewMode === 'bookmarks') {
                        window.userPanelApp.renderState();
                    }
                });

                if (allowedVIPs.includes(email)) {
                    window.globalUserStatus = { isVIP: true, daysLeft: 999, validUntil: 'Lifetime Access', expired: false };
                    window.accessLevel = 'premium';
                    if(window.isDataLoaded) window.processDataForAccess();
                    window.userPanelApp.renderState();
                } else {
                    onValue(ref(db, 'users/' + user.uid + '/subscription'), (snapshot) => {
                        let subDataObj = { isVIP: false, daysLeft: 0, validUntil: null, expired: false };
                        if (snapshot.exists()) {
                            const subData = snapshot.val();
                            const today = new Date(); today.setHours(0,0,0,0);
                            const expiry = new Date(subData.validUntil); expiry.setHours(0,0,0,0);
                            const daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
                            if (daysLeft >= 0 && subData.status === "active") subDataObj = { isVIP: true, daysLeft: daysLeft, validUntil: subData.validUntil, expired: false };
                            else subDataObj = { isVIP: false, daysLeft: daysLeft, validUntil: subData.validUntil, expired: true };
                        }
                        window.globalUserStatus = subDataObj;
                        window.accessLevel = subDataObj.isVIP ? 'premium' : 'free';
                        if(window.isDataLoaded) window.processDataForAccess();
                        window.userPanelApp.renderState();
                    });
                }
            } else {
                if (summaryBtn) summaryBtn.style.display = 'none';
                
                localStorage.removeItem('medqs_user_email');
                window.globalUserStatus = { isVIP: false, daysLeft: 0, validUntil: null, expired: false };
                window.userBookmarks = {}; 
                window.currentUserProfileData = {};
                window.accessLevel = 'guest';
                if(window.isDataLoaded) window.processDataForAccess();
                window.userPanelApp.renderState();
            }
        });
    </script>
</body>
</html>
