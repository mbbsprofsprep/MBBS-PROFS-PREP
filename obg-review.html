    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden;}

        body.show-answers .correct-option { font-weight: 700; color: #15803d; background-color: #dcfce7; padding: 2px 6px; border-radius: 4px; border: 1px solid #22c55e; }

        html.dark .deck-opt-wrong { background: rgba(239, 68, 68, 0.15) !important; color: #f87171 !important; border-color: #dc2626 !important; }
        
        #view-toggle-btn { position: fixed; bottom: 24px; right: 24px; z-index: 10000; width: 60px; height: 60px; border-radius: 50%; background: #0ea5e9; color: white; box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; transition: transform 0.2s; }
        #view-toggle-btn:active { transform: scale(0.90); }
        
        .deck-drawer { position: fixed; inset: 0; z-index: 10001; pointer-events: none; opacity: 0; transition: opacity 0.3s ease; }
        .deck-drawer.open { pointer-events: auto; opacity: 1; }

        .deck-drawer-content { position: absolute; top: 0; right: 0; bottom: 0; width: 85%; max-width: 320px; background: white; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }

        .deck-drawer.open .deck-drawer-content { transform: translateX(0); }
        
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 16px; overflow-y: auto; }

        .deck-nav-btn.wrong { background: #ef4444; color: white; border-color: #dc2626; }

        <div class="max-w-7xl mx-auto px-4 md:px-6 flex flex-col md:flex-row justify-between items-center gap-4 text-sm text-slate-500 dark:text-slate-400">

        </div>

    <script>
        // --- CONSTANTS & GLOBALS ---
        window.SECRET_CODE = "777pankaj";
        window.optionLetters = ['A', 'B', 'C', 'D'];
        window.motivationalMessages = ["Hi [Name]! You are bringing life to your studies!", "Hey [Name], every expert was once a beginner. Keep pushing.", "Take a deep breath, [Name]. You are doing amazing work!"];

        window.globalUserStatus = { isVIP: false, daysLeft: 0, validUntil: null, expired: false };
        window.currentUserObj = null;
        window.currentUserProfileData = {};
        window.accessLevel = 'guest'; 
        window.filterState = { types: new Set(), chapters: new Set(), exams: new Set() };
        window.isDataLoaded = false;
        window.userBookmarks = {}; 

        window.COLLEGE_NAME = "AIIMS";
        window.curriculumData = [];
        window.qnaData = [];
        window.displayData = [];

        // --- EYE TOGGLE LOGIC ---
        window.toggleAnswers = function() {
            document.body.classList.toggle('show-answers');
            const btn = document.getElementById('revealAnswersBtn');
            if (document.body.classList.contains('show-answers')) {
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.059 10.059 0 011.591-2.714M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1.5 1.5l22.5 22.5" /></svg>`;
                btn.classList.add('text-brand-500', 'bg-brand-50', 'dark:bg-brand-900/30', 'border-brand-200', 'dark:border-brand-800');
                btn.classList.remove('text-slate-400');
            } else {
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>`;
                btn.classList.remove('text-brand-500', 'bg-brand-50', 'dark:bg-brand-900/30', 'border-brand-200', 'dark:border-brand-800');
                btn.classList.add('text-slate-400');
            }
        };

        // --- FETCH DYNAMIC JSON LOGIC ---
        window.fetchQuestions = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const collegeCode = urlParams.get('college') || 'deoghar'; 
            
            const tableBody = document.getElementById('tableBody');
            if(tableBody) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-slate-500 dark:text-slate-400"><div class="w-8 h-8 border-4 border-brand-200 border-t-brand-500 rounded-full animate-spin mx-auto mb-3"></div><p class="font-bold">Downloading Question Bank...</p></td></tr>`;
            }

            try {
                const response = await fetch(`obg_aiims_${collegeCode}_data.json`);
                if (!response.ok) throw new Error("Failed to load JSON file");
                
                const data = await response.json();
                window.COLLEGE_NAME = data.collegeName || "AIIMS";
                window.curriculumData = data.curriculumData || [];
                window.qnaData = data.qnaData || [];
                window.isDataLoaded = true;

                document.getElementById('dynamic-page-title').innerText = `MBBS PROFS PREP - OBG Review (${window.COLLEGE_NAME})`;
                const headerEl = document.getElementById('dynamic-college-header');
                if(headerEl) headerEl.innerText = window.COLLEGE_NAME;

            } catch (error) {
                console.error("Error fetching data:", error);
                if(tableBody) tableBody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-red-500"><p class="font-bold text-lg">⚠️ Failed to load questions.</p><p class="text-sm">Please check your internet connection or the URL parameter.</p></td></tr>`;
            }
        };

        window.getUnitForChapter = function(chapterName) {
            for (const section of window.curriculumData) {
                if (section.chapters.includes(chapterName)) return section.unit;
            }
            return "";
        };

        window.processDataForAccess = function() {
            if (!window.isDataLoaded) return; 

            if (window.accessLevel === 'premium') {
                window.displayData = [...window.qnaData];
            } else if (window.accessLevel === 'free') {
                const theoryQs = window.qnaData.filter(q => q.type === 'Theory').slice(0, 10);
                const mcqQs = window.qnaData.filter(q => q.type === 'MCQ').slice(0, 10);
                window.displayData = [...theoryQs, ...mcqQs];
            } else {
                window.displayData = [];
            }

            window.populateFilters(); 
            window.populateDeckFilters(); 
            window.populateTable();
            if (typeof window.syncDeckWithFilters === 'function') window.syncDeckWithFilters();
        };

        // --- BOOKMARK LOGIC ---
        window.toggleBookmark = async function(btn, index) {
            if (!window.currentUserObj) {
                return window.showModal("Login Required", "<p class='text-sm text-slate-500 dark:text-slate-400'>Please sign in to save questions to your cloud profile.</p>", `<button onclick="window.closeModal(); window.userPanelApp.open(); window.toggleAuthMode('login')" class="w-full py-3 bg-brand-500 text-white rounded-xl font-bold border-none">Sign In</button>`, "🔒");
            }

            const item = window.displayData[index];
            const qId = item.q; 
            const cleanStem = item.stem.replace(/<[^>]*>/g, "");
            
            const bookmarkData = {
                q: item.q,
                type: item.type,
                text: cleanStem, 
                options: item.options || null, 
                ans_key: item.ans_key || null, 
                subject: window.COLLEGE_NAME + " - " + (item.chapter ? item.chapter[0] : 'General'),
                url: window.location.href,
                timestamp: new Date().toISOString()
            };
            
            const isSaved = window.isBookmarked(qId);
            if (window.executeBookmarkToggle) window.executeBookmarkToggle(qId, bookmarkData, isSaved);
        };

        window.isBookmarked = function(qId) { return !!window.userBookmarks[qId]; };

        window.updateBookmarkUI = function() {
            if (!window.displayData) return;
            const savedClass = 'bg-yellow-100 text-yellow-600 border-yellow-300 dark:bg-yellow-900/30 dark:text-yellow-400 dark:border-yellow-700';
            const unsavedClass = 'bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700';
            const tableBase = 'w-full max-w-[80px] font-semibold py-1.5 px-2 rounded-lg text-xs flex items-center justify-center gap-1 border hover:opacity-80 transition-colors';
            const deckBase = 'px-3 py-1.5 rounded-lg text-xs font-bold border shadow-sm transition-colors';

            window.displayData.forEach((item) => {
                const isSaved = !!window.userBookmarks[item.q];
                const activeColors = isSaved ? savedClass : unsavedClass;
                const activeText = isSaved ? '⭐ Saved' : '🔖 Save';

                const tBtn = document.getElementById(`bmk-table-${item.q}`);
                if (tBtn) { tBtn.className = `${tableBase} ${activeColors}`; tBtn.innerHTML = activeText; }

                const dBtn = document.getElementById(`bmk-deck-${item.q}`);
                if (dBtn) { dBtn.className = `${deckBase} ${activeColors}`; dBtn.innerHTML = activeText; }
            });
        };

        // --- NATURAL SORTING + ARRAY FLATTENING ---
        window.getUniqueValues = function(key) {
            const values = new Set();
            if (key === 'chapter') {
                if (window.curriculumData) {
                    window.curriculumData.forEach(group => group.chapters.forEach(ch => values.add(ch)));
                }
                return Array.from(values).sort((a, b) => String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: 'base' }));
            } 
            
            window.qnaData.forEach(item => { 
                if (key === 'type' && item.type) { values.add(item.type); } 
                else if (key === 'exam' && item.examBatch) {
                    if (Array.isArray(item.examBatch)) { item.examBatch.forEach(e => values.add(e)); } 
                    else { values.add(item.examBatch); }
                } else if (item[key]) { values.add(item[key]); }
            });

        window.filterTable = function() {
            const searchText = document.getElementById("searchInput").value.toLowerCase();
            const table = document.getElementById("qnaTable");
            if(!table) return;
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                if (tr[i].getAttribute('data-locked-row') === "true") { tr[i].style.display = ""; continue; }
                const dataIndex = tr[i].getAttribute('data-index'); 
                const item = window.displayData[dataIndex];
                if(!item) continue;

                let showRow = true;
                if (searchText) {
                    let rowText = (tr[i].cells[1].textContent || "") + (tr[i].cells[3].textContent || "") + (tr[i].cells[4].textContent || "");
                    if (rowText.toLowerCase().indexOf(searchText) === -1) showRow = false;
                }
                
                if (showRow && window.filterState.types.size > 0 && !window.filterState.types.has(item.type)) showRow = false;
                
                if (showRow && window.filterState.chapters.size > 0 && !(item.chapter && item.chapter.some(ch => window.filterState.chapters.has(ch)))) showRow = false;
                
                if (showRow && window.filterState.exams.size > 0) {
                    let hasExamMatch = false;
                    if (Array.isArray(item.examBatch)) {
                        hasExamMatch = item.examBatch.some(e => window.filterState.exams.has(e));
                    } else {
                        hasExamMatch = window.filterState.exams.has(item.examBatch);
                    }
                    if (!hasExamMatch) showRow = false;
                }

                tr[i].style.display = showRow ? "" : "none";
            }
        }

            const selectedChapters = getChecked('chapter');
            const selectedTypes = getChecked('type');
            const selectedBatches = getChecked('batch');
            const search = document.getElementById("searchInput").value.toLowerCase();

            window.activeDeckQuestions = window.displayData.filter(q => {
                let show = true;
                
                let examText = Array.isArray(q.examBatch) ? q.examBatch.join(" ") : (q.examBatch || "");
                let chapterText = Array.isArray(q.chapter) ? q.chapter.join(" ") : (q.chapter || "");
                let rowText = (q.stem || "") + " " + chapterText + " " + examText;
                
                if (search && rowText.toLowerCase().indexOf(search) === -1) show = false;
                if (show && selectedTypes.length > 0 && !selectedTypes.includes(q.type)) show = false;

                            <input type="checkbox" value="${opt}" class="deck-filter-checkbox mt-1 w-4 h-4 text-brand-500 rounded border-slate-300 dark:border-slate-600 focus:ring-brand-500 bg-slate-50 dark:bg-slate-900 outline-none" data-category="${category}">
                            <span class="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white leading-snug">${opt}</span>
                        </label>`).join('')}
                    </div>
                </details>`;
            };
            
            if(container) container.innerHTML = buildGroup('Chapters', 'chapter', chapters) + buildGroup('Type', 'type', types) + buildGroup('Exam Batch', 'batch', batches);
        }

        window.resetDeckFilters = function() { document.querySelectorAll('.deck-filter-checkbox').forEach(cb => cb.checked = false); window.syncDeckWithFilters(); }

        window.renderDeckCard = function() {
            const container = document.getElementById('deck-card-container');
            
            if (window.accessLevel === 'guest') {
                container.innerHTML = `
                    <div class="deck-card glass-card flex flex-col items-center justify-center text-center p-8 h-full">
                        <div class="w-24 h-24 bg-brand-100 dark:bg-brand-900/30 text-brand-500 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner border border-brand-200 dark:border-brand-800">🔒</div>
                        <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-3">Login Required</h2>
                        <p class="text-slate-500 dark:text-slate-400 mb-8 font-medium">You must be signed in to view the free questions in this deck.</p>
                        <button onclick="window.toggleDeckMode(); window.userPanelApp.open(); window.toggleAuthMode('login')" class="px-10 py-4 bg-brand-500 text-white font-bold rounded-xl shadow-lg shadow-brand-500/30 hover:bg-brand-600 transition-all w-full max-w-xs border-none">Sign In / Register</button>
                    </div>`;
                document.getElementById('deck-counter').innerText = `🔒`; return;
            }

            if (window.accessLevel === 'free' && window.deckIndex === window.activeDeckQuestions.length) {
                container.innerHTML = `
                    <div class="deck-card glass-card flex flex-col items-center justify-center text-center p-8 h-full">
                        <div class="w-24 h-24 bg-brand-100 dark:bg-brand-900/30 text-brand-500 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner border border-brand-200 dark:border-brand-800">🔒</div>
                        <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-3">End of Free Preview</h2>
                        <p class="text-slate-500 dark:text-slate-400 mb-8 font-medium">You've completed the free questions. Upgrade to Pro to unlock the remaining premium questions in this deck.</p>
                        <a href="checkout.html" class="px-10 py-4 bg-brand-500 text-white font-bold rounded-xl shadow-lg shadow-brand-500/30 hover:bg-brand-600 transition-all w-full max-w-xs block">Upgrade to Pro</a>
                    </div>`;
                document.getElementById('deck-counter').innerText = `🔒`; return;
            }

            if (window.activeDeckQuestions.length === 0) { 
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-400"><div class="text-4xl mb-4 opacity-50">🔍</div><p class="font-bold text-slate-600 dark:text-slate-400">No questions match these filters.</p></div>`; 
                document.getElementById('deck-counter').innerText = '0/0'; 
                return; 
            }
            
            const q = window.activeDeckQuestions[window.deckIndex];
            const realIndex = window.displayData.indexOf(q); 
            document.getElementById('deck-counter').innerText = `${window.deckIndex + 1}/${window.activeDeckQuestions.length}`;

            const cleanStem = q.stem.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            let questionHtml = ''; let optsHtml = '';

            const bookmarked = window.isBookmarked(q.q);
            const bmkClass = bookmarked ? 'bg-yellow-100 text-yellow-600 border-yellow-300 dark:bg-yellow-900/30 dark:text-yellow-400 dark:border-yellow-700' : 'bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700';
            const bmkText = bookmarked ? '⭐ Saved' : '🔖 Save';

            if (q.type === 'MCQ') {
                questionHtml = `<div class="mb-6"><h2 class="text-xl font-bold text-slate-900 dark:text-white leading-snug text-left">${cleanStem}</h2></div>`;
                if (q.options) { 
                    optsHtml = `<div class="space-y-3 pb-6">${q.options.map((opt, i) => { 
                        const letter = window.optionLetters[i]; 
                        const cleanOpt = opt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        
                        const status = window.deckStatus[q.q];
                        let btnClass = "deck-option-btn group";
                        let disabledAttr = status ? "disabled" : ""; 

                        if (status && letter === q.ans_key) {
                            btnClass += " deck-opt-correct";
                        }

                        return `<button onclick="window.checkDeckAnswer(this, '${letter}', '${q.ans_key}')" class="${btnClass}" ${disabledAttr}><div class="flex items-start gap-3"><span class="flex-shrink-0 w-7 h-7 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-500 text-sm font-bold flex items-center justify-center border border-slate-200 dark:border-slate-600 group-hover:bg-brand-500 group-hover:text-white transition-colors">${letter}</span><span class="text-slate-700 dark:text-slate-200 font-medium pt-0.5 text-left w-full">${cleanOpt}</span></div></button>`; 
                    }).join('')}</div>`; 
                }
            } else { 
                questionHtml = `<div class="mb-6"><div class="theory-question shadow-sm dark:bg-dark-bg dark:text-brand-200 dark:border-brand-500 text-left"><span>${cleanStem}</span></div></div>`; 
            }

            container.innerHTML = `
                <div class="deck-card glass-card">
                    <div class="mb-4 flex justify-between items-center">
                        <span class="px-3 py-1 bg-brand-100 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 rounded-full text-xs font-bold border border-brand-200 dark:border-brand-800">${q.q}</span>
                        <div class="flex gap-2">
                            <button id="bmk-deck-${q.q}" onclick="window.toggleBookmark(this, ${realIndex})" class="px-3 py-1.5 rounded-lg ${bmkClass} text-xs font-bold border shadow-sm transition-colors">${bmkText}</button>
                            <button onclick="window.askAI(this, window.displayData[${realIndex}])" class="px-3 py-1.5 rounded-lg bg-green-500/10 dark:bg-green-500/20 text-green-600 dark:text-green-400 text-xs font-bold hover:bg-green-500 hover:text-white dark:hover:bg-green-500 border border-green-500/20 shadow-sm flex items-center gap-1.5 transition-colors"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg> Ask AI</button>
                        </div>
                    </div>
                    ${questionHtml}
                    ${optsHtml}
                    <div class="mt-auto pt-4 border-t border-slate-100 dark:border-slate-800 flex flex-wrap gap-2">
                        ${q.chapter && Array.isArray(q.chapter) ? q.chapter.map(ch => `<span class="px-2 py-1 rounded-md bg-slate-100 dark:bg-slate-800 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase border border-slate-200 dark:border-slate-700">${ch}</span>`).join('') : ''}
                    </div>
                </div>`;
            container.scrollTop = 0;
        }

        window.checkDeckAnswer = function(btn, picked, correct) {
            const q = window.activeDeckQuestions[window.deckIndex];
            const p = picked.toUpperCase(); const c = correct.toUpperCase();
            btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);
            if (p === c) { btn.classList.add('deck-opt-correct'); window.deckStatus[q.q] = 'correct'; } 
            else {
                btn.classList.add('deck-opt-wrong'); window.deckStatus[q.q] = 'wrong';
                btn.parentElement.querySelectorAll('button').forEach((b, i) => { if (window.optionLetters[i] === c) b.classList.add('deck-opt-correct'); });
            }
        }

        window.toggleDeckDrawer = function(type) {
            const nav = document.getElementById('deck-nav-drawer');
            const filt = document.getElementById('deck-filter-drawer');
            if (nav) nav.classList.remove('open'); if (filt) filt.classList.remove('open');
            if (type === 'nav') {
                document.getElementById('deck-nav-grid').innerHTML = window.activeDeckQuestions.map((q, i) => {
                    const st = window.deckStatus[q.q]; let cls = "deck-nav-btn";
                    if (st === 'correct') cls += " correct"; if (st === 'wrong') cls += " wrong"; if (i === window.deckIndex) cls += " active";
                    return `<button onclick="window.deckIndex=${i}; window.toggleDeckDrawer(null); window.renderDeckCard();" class="${cls} border-none outline-none">${q.q}</button>`;
                }).join('');
                nav.classList.add('open');
            }
            if (type === 'filter') filt.classList.add('open');
        }

        window.deckNext = function() { 
            if (window.deckIndex < window.activeDeckQuestions.length - 1) { window.deckIndex++; window.renderDeckCard(); } 
            else if (window.accessLevel === 'free' && window.deckIndex === window.activeDeckQuestions.length - 1) { window.deckIndex++; window.renderDeckCard(); }
        }
        window.deckPrev = function() { if (window.deckIndex > 0) { window.deckIndex--; window.renderDeckCard(); } }

        window.toggleDeckMode = function() {
            window.isDeckMode = !window.isDeckMode;
            const mainContent = document.getElementById('main-wrapper');
            const deck = document.getElementById('universal-deck-layer');
            const fab = document.getElementById('view-toggle-btn');
            
            if (window.isDeckMode) {
                if (mainContent) mainContent.style.display = 'none';
                deck.style.display = 'flex';
                fab.innerHTML = '📋';
                fab.title = "Switch to Table View";
                window.syncDeckWithFilters(); 
            } else {
                if (mainContent) mainContent.style.display = 'block';
                deck.style.display = 'none';
                fab.innerHTML = '🎴'; 
                fab.title = "Switch to Deck View";
            }
        }

        // ==========================================
        // BOOT SEQUENCE
        // ==========================================
        window.onload = async () => { 
            if (localStorage.getItem('theme') === 'dark') {
                const icon = document.getElementById('theme-icon');
                if(icon) icon.innerText = '☀️';
            }
            const modal = document.getElementById('actionModal');
            if (modal && modal.parentElement !== document.body) document.body.appendChild(modal);
            
            await window.fetchQuestions();
            window.initDeckView(); 
        };
    </script>
