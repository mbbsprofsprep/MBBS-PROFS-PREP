    <script>
        window.SECRET_CODE = "777pankaj";
        window.optionLetters = ['A', 'B', 'C', 'D'];
        window.motivationalMessages = ["Hi [Name]! You are bringing life to your studies!", "Hey [Name], every expert was once a beginner. Keep pushing.", "Take a deep breath, [Name]. You are doing amazing work!"];

        // Secure Global State
        window.globalUserStatus = { isVIP: false, daysLeft: 0, validUntil: null, expired: false };
        window.currentUserObj = null;
        window.accessLevel = 'guest'; 
        window.filterState = { types: new Set(), chapters: new Set(), exams: new Set() };
        window.isDataLoaded = false;

        // Data Arrays
        window.COLLEGE_NAME = "AIIMS";
        window.curriculumData = [];
        window.qnaData = [];
        window.displayData = [];

        // --- AUTH UI HELPERS ---
        window.toggleAuthMode = function(mode) { window.userPanelApp.authMode = mode; window.userPanelApp.renderState(); };
        window.togglePassword = function() {
            const input = document.getElementById('login-pass') || document.getElementById('reg-pass');
            const icon = document.getElementById('eye-icon');
            if (!input) return;
            if (input.type === "password") {
                input.type = "text";
                if(icon) icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a10.059 10.059 0 011.591-2.714M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1.5 1.5l22.5 22.5" />`;
            } else {
                input.type = "password";
                if(icon) icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        };
        window.showAuthError = function(msg) {
            const errDiv = document.getElementById('auth-error-msg');
            if(errDiv) { errDiv.innerText = msg; errDiv.classList.remove('hidden'); setTimeout(() => errDiv.classList.add('hidden'), 5000); } 
            else { alert(msg); }
        };

        // --- FETCH DYNAMIC JSON LOGIC ---
        window.fetchQuestions = async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const collegeCode = urlParams.get('college') || 'deoghar'; 
            
            const tableBody = document.getElementById('tableBody');
            if(tableBody) {
                tableBody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-slate-500 dark:text-slate-400"><div class="w-8 h-8 border-4 border-brand-200 border-t-brand-500 rounded-full animate-spin mx-auto mb-3"></div><p class="font-bold">Downloading Question Bank...</p></td></tr>`;
            }

            try {
                const response = await fetch(`obg_aiims_${collegeCode}_data.json`);
                if (!response.ok) throw new Error("Failed to load JSON file");
                
                const data = await response.json();
                window.COLLEGE_NAME = data.collegeName || "AIIMS";
                window.curriculumData = data.curriculumData || [];
                window.qnaData = data.qnaData || [];
                window.isDataLoaded = true;

                document.getElementById('dynamic-page-title').innerText = `MBBS PROFS PREP - OBG Review (${window.COLLEGE_NAME})`;
                const headerEl = document.getElementById('dynamic-college-header');
                if(headerEl) headerEl.innerText = window.COLLEGE_NAME;

            } catch (error) {
                console.error("Error fetching data:", error);
                if(tableBody) tableBody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-red-500"><p class="font-bold text-lg">⚠️ Failed to load questions.</p><p class="text-sm">Please check your internet connection or the URL parameter.</p></td></tr>`;
            }
        };

        window.getUnitForChapter = function(chapterName) {
            for (const section of window.curriculumData) {
                if (section.chapters.includes(chapterName)) return section.unit;
            }
            return "";
        };

        window.userPanelApp = {
            isOpen: false, authMode: 'login', 
            getEl: function(id) { return document.getElementById(id); },
            toggle: function() { this.isOpen ? this.close() : this.open(); },
            open: function() { this.isOpen = true; this.renderState(); this.getEl('user-panel-drawer').classList.remove('-translate-x-full'); this.getEl('user-panel-backdrop').classList.remove('opacity-0', 'pointer-events-none'); },
            close: function() { this.isOpen = false; this.getEl('user-panel-drawer').classList.add('-translate-x-full'); this.getEl('user-panel-backdrop').classList.add('opacity-0', 'pointer-events-none'); },
            renderState: function() {
                const user = window.currentUserObj;
                const bodyEl = this.getEl('user-panel-body');
                const footerEl = this.getEl('user-panel-footer');
                if(!bodyEl || !footerEl) return;

                if (user) {
                    let badgeHtml = ''; let daysHtml = '';
                    if (window.globalUserStatus.isVIP) {

        window.filterTable = function() {
            const searchText = document.getElementById("searchInput").value.toLowerCase();
            const table = document.getElementById("qnaTable");
            if(!table) return;
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                if (tr[i].getAttribute('data-locked-row') === "true") { tr[i].style.display = ""; continue; }
                const dataIndex = tr[i].getAttribute('data-index'); 
                const item = window.displayData[dataIndex];
                if(!item) continue;

                let showRow = true;
                if (searchText) {
                    let rowText = (tr[i].cells[1].textContent || "") + (tr[i].cells[3].textContent || "") + (tr[i].cells[4].textContent || "");
                    if (rowText.toLowerCase().indexOf(searchText) === -1) showRow = false;
                }
                if (showRow && window.filterState.types.size > 0 && !window.filterState.types.has(item.type)) showRow = false;
                if (showRow && window.filterState.chapters.size > 0 && !item.chapter.some(ch => window.filterState.chapters.has(ch))) showRow = false;
                if (showRow && window.filterState.exams.size > 0 && !window.filterState.exams.has(item.examBatch)) showRow = false;
                tr[i].style.display = showRow ? "" : "none";
            }

        window.copyForChatGPT = function() {
            const visibleQuestions = []; const tr = document.getElementById("qnaTable").getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) { if (tr[i].style.display !== "none" && tr[i].getAttribute('data-locked-row') !== "true") visibleQuestions.push(window.displayData[tr[i].getAttribute('data-index')]); }

            let cb = `Checklist:\n`; visibleQuestions.forEach(q => cb += `Q: ${q.stem.replace(/<[^>]*>/g, "")}\n`);
            const t = document.createElement('textarea'); t.value = cb; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
            window.showModal("Copied!", `<p class="text-slate-500 dark:text-slate-400">Copied ${visibleQuestions.length} questions.</p>`, `<button onclick="window.openChatGPT()" class="w-full bg-brand-500 text-white font-bold py-3 rounded-xl">ChatGPT</button>`, `📋`);

        window.showModal = function(title, bodyHtml, footerHtml, iconHtml) { 
            const modal = document.getElementById('actionModal');
            document.getElementById('modal-title').textContent = title; document.getElementById('modal-body-content').innerHTML = bodyHtml; document.getElementById('modal-footer-buttons').innerHTML = footerHtml; document.getElementById('modalIcon').innerHTML = iconHtml; modal.classList.remove('hidden'); 
        }
        window.closeModal = function() { document.getElementById('actionModal').classList.add('hidden'); }
        window.openChatGPT = function() { window.open('https://chat.openai.com/', '_blank'); window.closeModal(); }

        window.toggleTheme = function() {
            const isDark = document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light');
            const icon = document.getElementById('theme-icon'); if (icon) icon.innerText = isDark ? '☀️' : '🌙';
        }

        // ==========================================
        // ORIGINAL DECK VIEW RESTORED 
        // ==========================================
        window.isDeckMode = false;
        window.activeDeckQuestions = [];
        window.deckIndex = 0;
        window.deckStatus = {};

        window.syncDeckWithFilters = function() {
            const getChecked = (category) => { return Array.from(document.querySelectorAll(`.deck-filter-checkbox[data-category="${category}"]:checked`)).map(cb => cb.value); };
            const selectedChapters = getChecked('chapter');
            const selectedTypes = getChecked('type');
            const selectedBatches = getChecked('batch');
            const search = document.getElementById("searchInput").value.toLowerCase();

            window.activeDeckQuestions = window.displayData.filter(q => {
                let show = true;
                let rowText = (q.stem || "") + (q.chapter.join(" ") || "") + (q.examBatch || "");
                if (search && rowText.toLowerCase().indexOf(search) === -1) show = false;
                if (show && selectedTypes.length > 0 && !selectedTypes.includes(q.type)) show = false;
                if (show && selectedBatches.length > 0 && !selectedBatches.includes(q.examBatch)) show = false;
                if (show && selectedChapters.length > 0 && !q.chapter.some(ch => selectedChapters.includes(ch))) show = false;
                return show;
            });
            
            window.deckIndex = 0;
            const sub = document.getElementById('deck-subtitle');
            if (sub) sub.innerText = window.activeDeckQuestions.length === window.displayData.length ? `${window.activeDeckQuestions.length} Questions` : `${window.activeDeckQuestions.length} Filtered`;
            window.renderDeckCard();
        }

        window.initDeckView = function() {
            const deckLayer = document.createElement('div');
            deckLayer.id = 'universal-deck-layer';
            
            // EXACT HTML from the requested "previous style"
            deckLayer.innerHTML = `
                <div class="px-4 py-3 bg-white dark:bg-dark-surface border-b border-slate-200 dark:border-slate-800 flex justify-between items-center shadow-sm z-10 shrink-0">
                    <div class="flex items-center gap-3">
                        <button onclick="window.toggleDeckDrawer('filter')" class="p-2 -ml-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-colors">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
                        </button>
                        <div>
                            <h1 class="font-bold text-lg text-brand-600 dark:text-brand-400 truncate">Review Mode</h1>
                            <div class="text-xs text-slate-500 font-medium" id="deck-subtitle">Loading...</div>
                        </div>
                    </div>
                    <button onclick="window.toggleDeckDrawer('nav')" class="flex items-center gap-2 px-3 py-1.5 rounded-lg bg-slate-100 dark:bg-slate-800 text-sm font-bold text-slate-700 dark:text-slate-300 border border-slate-200 dark:border-slate-700">
                        <span id="deck-counter">1/1</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </button>
                </div>
                <div class="flex-1 p-4 overflow-hidden relative bg-slate-50 dark:bg-dark-bg" id="deck-card-container"></div>
                <div class="p-4 bg-white dark:bg-dark-surface border-t border-slate-200 dark:border-slate-800 flex gap-3 z-10 shrink-0 pb-20">
                    <button onclick="window.deckPrev()" class="flex-1 py-3 rounded-xl bg-slate-100 dark:bg-slate-800 font-bold text-slate-600 dark:text-slate-300 active:scale-95 transition-transform">Previous</button>
                    <button onclick="window.deckNext()" class="flex-1 py-3 rounded-xl bg-brand-500 text-white font-bold shadow-lg shadow-brand-500/30 active:scale-95 transition-transform">Next</button>
                </div>
                <div id="deck-nav-drawer" class="deck-drawer">
                    <div class="deck-drawer-bg" onclick="window.toggleDeckDrawer(null)"></div>
                    <div class="deck-drawer-content">
                        <div class="p-4 border-b border-slate-200 dark:border-slate-700 font-bold flex justify-between text-slate-800 dark:text-white"><span>Navigator</span><button onclick="window.toggleDeckDrawer(null)">✕</button></div>
                        <div class="nav-grid" id="deck-nav-grid"></div>
                    </div>
                </div>
                <div id="deck-filter-drawer" class="deck-drawer">
                    <div class="deck-drawer-bg" onclick="window.toggleDeckDrawer(null)"></div>
                    <div class="deck-drawer-content">
                        <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
                            <span class="font-bold text-lg text-slate-800 dark:text-white">Filters</span>
                            <button onclick="window.resetDeckFilters()" class="text-xs text-brand-600 font-bold bg-brand-50 dark:bg-brand-900/30 px-3 py-1 rounded-full border border-brand-100 dark:border-brand-800">RESET</button>
                        </div>
                        <div class="p-5 overflow-y-auto flex-1" id="deck-filter-content"></div>
                        <div class="p-4 border-t border-slate-200 dark:border-slate-700">
                            <button onclick="window.syncDeckWithFilters(); window.toggleDeckDrawer(null);" class="w-full py-3 bg-brand-500 text-white rounded-xl font-bold shadow-lg shadow-brand-500/30 active:scale-95 transition-transform">Apply Filters</button>
                        </div>
                    </div>
                </div>
            `;

            const fab = document.createElement('button'); 
            fab.id = 'view-toggle-btn'; 
            fab.innerHTML = '🎴'; 
            fab.title = "Switch to Deck View";
            fab.onclick = window.toggleDeckMode; 
            document.body.appendChild(fab);
        }

        window.populateDeckFilters = function() {
            const chapters = [...new Set(window.qnaData.flatMap(q => q.chapter))].sort();
            const types = [...new Set(window.qnaData.map(q => q.type))].sort();
            const batches = [...new Set(window.qnaData.map(q => q.examBatch))].sort();
            
            const container = document.getElementById('deck-filter-content');
            const buildGroup = (label, category, opts) => {
                if (!opts || opts.length <= 1) return '';
                return `<div class="mb-6 filter-group">
                            <div class="font-bold text-xs text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-3 px-1">${label}</div>
                            <div class="space-y-2">
                                ${opts.map(opt => `<label class="flex items-start gap-3 p-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 cursor-pointer transition-colors group"><input type="checkbox" value="${opt}" class="deck-filter-checkbox mt-1 w-4 h-4 text-brand-500 rounded border-slate-300 dark:border-slate-600 focus:ring-brand-500 bg-slate-50 dark:bg-slate-900" data-category="${category}"><span class="text-sm font-medium text-slate-700 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white leading-snug">${opt}</span></label>`).join('')}
                            </div>
                        </div>`;
            };
            if(container) container.innerHTML = buildGroup('Chapters', 'chapter', chapters) + buildGroup('Type', 'type', types) + buildGroup('Exam Batch', 'batch', batches);
        }

        window.resetDeckFilters = function() { document.querySelectorAll('.deck-filter-checkbox').forEach(cb => cb.checked = false); window.syncDeckWithFilters(); }

        window.renderDeckCard = function() {
            const container = document.getElementById('deck-card-container');
            
            if (window.accessLevel === 'guest') {
                container.innerHTML = `
                    <div class="deck-card glass-card flex flex-col items-center justify-center text-center p-8 h-full">
                        <div class="w-24 h-24 bg-brand-100 dark:bg-brand-900/30 text-brand-500 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner border border-brand-200 dark:border-brand-800">🔒</div>
                        <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-3">Login Required</h2>
                        <p class="text-slate-500 dark:text-slate-400 mb-8 font-medium">You must be signed in to view the free questions in this deck.</p>
                        <button onclick="window.toggleDeckMode(); window.userPanelApp.open(); window.toggleAuthMode('login')" class="px-10 py-4 bg-brand-500 text-white font-bold rounded-xl shadow-lg shadow-brand-500/30 hover:bg-brand-600 transition-all w-full max-w-xs">Sign In / Register</button>
                    </div>`;
                document.getElementById('deck-counter').innerText = `🔒`; return;
            }

            if (window.accessLevel === 'free' && window.deckIndex === window.activeDeckQuestions.length) {
                container.innerHTML = `
                    <div class="deck-card glass-card flex flex-col items-center justify-center text-center p-8 h-full">
                        <div class="w-24 h-24 bg-brand-100 dark:bg-brand-900/30 text-brand-500 rounded-full flex items-center justify-center text-5xl mb-6 shadow-inner border border-brand-200 dark:border-brand-800">🔒</div>
                        <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-3">End of Free Preview</h2>
                        <p class="text-slate-500 dark:text-slate-400 mb-8 font-medium">You've completed the free questions. Upgrade to Pro to unlock the remaining ${window.qnaData.length - 20} premium questions in this deck.</p>
                        <a href="checkout.html" class="px-10 py-4 bg-brand-500 text-white font-bold rounded-xl shadow-lg shadow-brand-500/30 hover:bg-brand-600 transition-all w-full max-w-xs">Upgrade to Pro</a>
                    </div>`;
                document.getElementById('deck-counter').innerText = `🔒`; return;
            }

            if (window.activeDeckQuestions.length === 0) { 
                container.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-slate-400"><div class="text-4xl mb-4 opacity-50">🔍</div><p class="font-bold text-slate-600 dark:text-slate-400">No questions match these filters.</p></div>`; 
                document.getElementById('deck-counter').innerText = '0/0'; 
                return; 
            }
            
            const q = window.activeDeckQuestions[window.deckIndex];
            const realIndex = window.displayData.indexOf(q); 
            document.getElementById('deck-counter').innerText = `${window.deckIndex + 1}/${window.activeDeckQuestions.length}`;

            const cleanStem = q.stem.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            let questionHtml = ''; let optsHtml = '';

            if (q.type === 'MCQ') {
                questionHtml = `<div class="mb-6"><h2 class="text-xl font-bold text-slate-900 dark:text-white leading-snug text-left">${cleanStem}</h2></div>`;
                if (q.options) { 
                    optsHtml = `<div class="space-y-3 pb-6">${q.options.map((opt, i) => { 
                        const letter = window.optionLetters[i]; const cleanOpt = opt.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        return `<button onclick="window.checkDeckAnswer(this, '${letter}', '${q.ans_key}')" class="deck-option-btn group"><div class="flex items-start gap-3"><span class="flex-shrink-0 w-7 h-7 rounded-lg bg-slate-100 dark:bg-slate-700 text-slate-500 text-sm font-bold flex items-center justify-center border border-slate-200 dark:border-slate-600 group-hover:bg-brand-500 group-hover:text-white transition-colors">${letter}</span><span class="text-slate-700 dark:text-slate-200 font-medium pt-0.5 text-left w-full">${cleanOpt}</span></div></button>`; 
                    }).join('')}</div>`; 
                }
            } else { 
                questionHtml = `<div class="mb-6"><div class="theory-question shadow-sm dark:bg-dark-bg dark:text-brand-200 dark:border-brand-500 text-left"><span>${cleanStem}</span></div></div>`; 
            }

            container.innerHTML = `
                <div class="deck-card glass-card">
                    <div class="mb-4 flex justify-between items-center">
                        <span class="px-3 py-1 bg-brand-100 dark:bg-brand-900/30 text-brand-600 dark:text-brand-400 rounded-full text-xs font-bold border border-brand-200 dark:border-brand-800">${q.q}</span>
                        <button onclick="window.askAI(this, window.displayData[${realIndex}])" class="px-3 py-1.5 rounded-lg bg-green-500/10 dark:bg-green-500/20 text-green-600 dark:text-green-400 text-xs font-bold hover:bg-green-500 hover:text-white dark:hover:bg-green-500 border border-green-500/20 shadow-sm flex items-center gap-1.5 transition-colors"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg> Ask AI</button>
                    </div>
                    ${questionHtml}
                    ${optsHtml}
                    <div class="mt-auto pt-4 border-t border-slate-100 dark:border-slate-800 flex flex-wrap gap-2">
                        ${q.chapter.map(ch => `<span class="px-2 py-1 rounded-md bg-slate-100 dark:bg-slate-800 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase border border-slate-200 dark:border-slate-700">${ch}</span>`).join('')}
                    </div>
                </div>`;
            container.scrollTop = 0;
        }

        window.checkDeckAnswer = function(btn, picked, correct) {
            const q = window.activeDeckQuestions[window.deckIndex];
            const p = picked.toUpperCase(); const c = correct.toUpperCase();
            btn.parentElement.querySelectorAll('button').forEach(b => b.disabled = true);
            if (p === c) { btn.classList.add('deck-opt-correct'); window.deckStatus[q.q] = 'correct'; } 
            else {
                btn.classList.add('deck-opt-wrong'); window.deckStatus[q.q] = 'wrong';
                btn.parentElement.querySelectorAll('button').forEach((b, i) => { if (window.optionLetters[i] === c) b.classList.add('deck-opt-correct'); });
            }
        }

        window.toggleDeckDrawer = function(type) {
            const nav = document.getElementById('deck-nav-drawer');
            const filt = document.getElementById('deck-filter-drawer');
            if (nav) nav.classList.remove('open'); if (filt) filt.classList.remove('open');
            if (type === 'nav') {
                document.getElementById('deck-nav-grid').innerHTML = window.activeDeckQuestions.map((q, i) => {
                    const st = window.deckStatus[q.q]; let cls = "deck-nav-btn";
                    if (st === 'correct') cls += " correct"; if (st === 'wrong') cls += " wrong"; if (i === window.deckIndex) cls += " active";
                    return `<button onclick="window.deckIndex=${i}; window.toggleDeckDrawer(null); window.renderDeckCard();" class="${cls}">${q.q}</button>`;
                }).join('');
                nav.classList.add('open');
            }
            if (type === 'filter') filt.classList.add('open');
        }

        window.deckNext = function() { 
            if (window.deckIndex < window.activeDeckQuestions.length - 1) { window.deckIndex++; window.renderDeckCard(); } 
            else if (window.accessLevel === 'free' && window.deckIndex === window.activeDeckQuestions.length - 1) { window.deckIndex++; window.renderDeckCard(); }
        }
        window.deckPrev = function() { if (window.deckIndex > 0) { window.deckIndex--; window.renderDeckCard(); } }

        window.toggleDeckMode = function() {
            window.isDeckMode = !window.isDeckMode;
            const mainContent = document.getElementById('main-wrapper');
            const deck = document.getElementById('universal-deck-layer');
            const fab = document.getElementById('view-toggle-btn');
            
            if (window.isDeckMode) {
                if (mainContent) mainContent.style.display = 'none';
                deck.style.display = 'flex';
                fab.innerHTML = '📋';
                fab.title = "Switch to Table View";
                window.syncDeckWithFilters(); 
            } else {
                if (mainContent) mainContent.style.display = 'block';
                deck.style.display = 'none';
                fab.innerHTML = '🎴'; 
                fab.title = "Switch to Deck View";
            }
        }

        // ==========================================
        // 🚀 BOOT SEQUENCE
        // ==========================================
        window.onload = async () => { 
            if (localStorage.getItem('theme') === 'dark') {
                const icon = document.getElementById('theme-icon');
                if(icon) icon.innerText = '☀️';
            }
            const modal = document.getElementById('actionModal');
            if (modal && modal.parentElement !== document.body) document.body.appendChild(modal);
            
            // Fetch JSON Data First
            await window.fetchQuestions();

            window.populateFilters(); 
            window.initDeckView(); 
            window.populateDeckFilters();
            
            window.processDataForAccess();
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDvPdEhkK1VDkuAqIhlSXPL2MXxlv7Mo9c",
            authDomain: "mbbs-profs-prep48c.firebaseapp.com",
            databaseURL: "https://mbbs-profs-prep48c-default-rtdb.firebaseio.com",
            projectId: "mbbs-profs-prep48c",
            storageBucket: "mbbs-profs-prep48c.firebasestorage.app",
            messagingSenderId: "378639777472",
            appId: "1:378639777472:web:9c2dcb689d97025f6ff725"
        };
        const fbApp = initializeApp(firebaseConfig);
        const auth = getAuth(fbApp);
        const db = getDatabase(fbApp);

        const allowedVIPs = ["pankajmahto109@gmail.com", "educateindiainstitute@gmail.com", "indrajeet91434@gmail.com", "pankajkumarmahto1009@gmail.com"];

        window.handleEmailLogin = function(btn) {
            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;
            if(!email || !pass) return window.showAuthError("Please enter both email and password.");
            
            const originalText = btn.innerText; btn.innerText = "Verifying..."; btn.disabled = true;

            signInWithEmailAndPassword(auth, email, pass).catch(e => {
                btn.innerText = originalText; btn.disabled = false;
                window.showAuthError("Login failed: " + e.message);
            });
        };

        window.handleEmailSignUp = async function(btn) {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            if(!name || !email || !pass) return window.showAuthError("Please fill mandatory fields.");
            if(pass.length < 6) return window.showAuthError("Password must be at least 6 characters.");
            
            const originalText = btn.innerText; btn.innerText = "Creating Profile..."; btn.disabled = true;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                await updateProfile(userCredential.user, { displayName: name });
                await set(ref(db, 'users/' + userCredential.user.uid + '/profile'), {
                    fullName: name, email: email, createdAt: new Date().toISOString()
                });
            } catch(e) {
                btn.innerText = originalText; btn.disabled = false;
                window.showAuthError(e.message);
            }
        };

        window.handleForgotPass = function() {
            const email = document.getElementById('login-email').value.trim();
            if(!email) return window.showAuthError("Enter your email in the box above.");
            sendPasswordResetEmail(auth, email).then(() => {
                document.getElementById('auth-error-msg').innerText = "Reset link sent!";
            }).catch(e => { window.showAuthError(e.message); });
        };

        window.firebaseSignOut = function() { signOut(auth).then(() => window.location.reload()); };

        onAuthStateChanged(auth, (user) => {
            window.currentUserObj = user;

            if (user) {
                const email = user.email.toLowerCase().trim();
                localStorage.setItem('medqs_user_email', email);

                if (allowedVIPs.includes(email)) {
                    window.globalUserStatus = { isVIP: true, daysLeft: 999, validUntil: 'Lifetime Access', expired: false };
                    window.accessLevel = 'premium';
                    if(window.isDataLoaded) window.processDataForAccess();
                    window.userPanelApp.renderState();
                } else {
                    onValue(ref(db, 'users/' + user.uid + '/subscription'), (snapshot) => {
                        let subDataObj = { isVIP: false, daysLeft: 0, validUntil: null, expired: false };
                        if (snapshot.exists()) {
                            const subData = snapshot.val();
                            const today = new Date(); today.setHours(0,0,0,0);
                            const expiry = new Date(subData.validUntil); expiry.setHours(0,0,0,0);
                            const daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
                            if (daysLeft >= 0 && subData.status === "active") subDataObj = { isVIP: true, daysLeft: daysLeft, validUntil: subData.validUntil, expired: false };
                            else subDataObj = { isVIP: false, daysLeft: daysLeft, validUntil: subData.validUntil, expired: true };
                        }
                        window.globalUserStatus = subDataObj;
                        window.accessLevel = subDataObj.isVIP ? 'premium' : 'free';
                        if(window.isDataLoaded) window.processDataForAccess();
                        window.userPanelApp.renderState();
                    });
                }
            } else {
                localStorage.removeItem('medqs_user_email');
                window.globalUserStatus = { isVIP: false, daysLeft: 0, validUntil: null, expired: false };
                window.accessLevel = 'guest';
                if(window.isDataLoaded) window.processDataForAccess();
                window.userPanelApp.renderState();
            }
        });
    </script>
