        // --- FILTERING STATE ---
        const filterState = {
            types: new Set(),
            chapters: new Set(),
            exams: new Set()
        };

        const motivationalMessages = [
            "Hi [Name]! You are bringing life to your studies, just like in OBG!",
            "Hey [Name], remember: Every expert was once a beginner. Keep pushing.",
            "Take a deep breath, [Name]. You are doing amazing work!",
            "You're mastering the art of life and care, [Name]!"
        ];

        // --- UTILITY FUNCTIONS ---
        function getUniqueValues(key) {
            const values = new Set();
            if (key === 'chapter') return curriculumData; 
            qnaData.forEach(item => {
                if (key === 'type') values.add(item.type);
                else if (key === 'exam') values.add(item.examBatch);
                else values.add(item[key]);
            });
            return Array.from(values).sort();
        }

        function toggleDropdown(id) {
            const allMenus = document.querySelectorAll('.multiselect-menu');
            allMenus.forEach(menu => {
                if (menu.id !== id + 'Menu') menu.classList.remove('show');
            });
            document.getElementById(id + 'Menu').classList.toggle('show');
        }

        function closeAllDropdowns(event) {
            if (!event.target.closest('.multiselect-container')) {
                document.querySelectorAll('.multiselect-menu').forEach(menu => menu.classList.remove('show'));
            }
        }

        function handleCheckboxChange(id, value, filterSetKey, label) {
            const set = filterState[filterSetKey];
            if (set.has(value)) set.delete(value);
            else set.add(value);
            
            updateButtonText(id, set, label);
            filterTable();
        }

        function toggleGroup(unitName, isChecked) {
            const groupCheckboxes = document.querySelectorAll(`input[data-group="${unitName}"]`);
            groupCheckboxes.forEach(cb => {
                if (cb.checked !== isChecked) {
                    cb.checked = isChecked;
                    handleCheckboxChange('chapterSelect', cb.value, 'chapters', 'Chapter');
                }
            });
        }

        function updateButtonText(id, set, label) {
            const btnText = document.getElementById(id + 'Text');
            if (set.size === 0) {
                btnText.textContent = `All ${label}s`;
                btnText.className = "text-gray-500 dark:text-gray-400";
            } else {
                btnText.textContent = `${set.size} ${label}(s) Selected`;
                btnText.className = "text-blue-700 dark:text-blue-400 font-semibold";
            }
        }

        function createMultiSelect(containerId, dropdownId, label, items, filterSetKey, isGrouped = false) {
            const container = document.getElementById(containerId);
            let listHtml = '';
            
            if (isGrouped) {
                items.forEach(group => {
                    listHtml += `
                        <label class="multiselect-group-header">
                            <input type="checkbox" onclick="toggleGroup('${group.unit}', this.checked)">
                            <span>${group.unit}</span>
                        </label>`;
                    
                    group.chapters.forEach(chapter => {
                         listHtml += `
                            <label class="multiselect-option">
                                <input type="checkbox" value="${chapter}" data-group="${group.unit}" onchange="handleCheckboxChange('${dropdownId}', this.value, '${filterSetKey}', '${label}')">
                                <span>${chapter}</span>
                            </label>`;
                    });
                });
            } else {
                items.forEach(item => {
                    listHtml += `
                        <label class="multiselect-option">
                            <input type="checkbox" value="${item}" onchange="handleCheckboxChange('${dropdownId}', this.value, '${filterSetKey}', '${label}')">
                            <span>${item}</span>
                        </label>`;
                });
            }

            container.innerHTML = `
                <div class="multiselect-container">
                    <button type="button" class="multiselect-btn" onclick="toggleDropdown('${dropdownId}')">
                        <span id="${dropdownId}Text" class="text-gray-500 dark:text-gray-400">All ${label}s</span>
                        <svg class="h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="${dropdownId}Menu" class="multiselect-menu">
                        ${listHtml}
                    </div>
                </div>`;
        }

        function populateFilters() {
            createMultiSelect('typeFilterWrapper', 'typeSelect', 'Type', getUniqueValues('type'), 'types');
            createMultiSelect('chapterFilterWrapper', 'chapterSelect', 'Chapter', curriculumData, 'chapters', true);
            createMultiSelect('examFilterWrapper', 'examSelect', 'Exam Batch', getUniqueValues('exam'), 'exams');
        }

        function populateTable() {
            const tbody = document.getElementById('qnaTable').getElementsByTagName('tbody')[0];
            tbody.innerHTML = ''; 

            qnaData.forEach((item, index) => {
                const row = tbody.insertRow();
                row.className = 'hover:bg-gray-50 dark:hover:bg-gray-800 group transition duration-150 ease-in-out border-b dark:border-gray-700'; 
                row.setAttribute('data-index', index);
                
                let cell1 = row.insertCell();
                cell1.className = 'px-4 py-4 text-center font-bold text-blue-700 dark:text-blue-400 border-r border-gray-200 dark:border-gray-700 align-middle';
                cell1.innerHTML = item.q;

                let cell2 = row.insertCell();
                cell2.className = 'px-6 py-4 align-top';
                
                let qHtml = '';
                const cleanStem = item.stem.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); 

                if (item.type === 'MCQ') {
                    qHtml += `<span class="block font-semibold mb-2 text-gray-900 dark:text-gray-100">${cleanStem}</span>`;
                    qHtml += '<div class="space-y-1">';

                    if (item.options && Array.isArray(item.options)) {
                         item.options.forEach((option, idx) => {
                            const optionLetter = optionLetters[idx];
                            const isCorrect = optionLetter === item.ans_key;
                            const cleanOption = option.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

                            if (isCorrect) {
                                qHtml += `<div class="text-sm text-gray-600 dark:text-gray-400 ml-2">
                                            <span class="correct-option">${optionLetter}) ${cleanOption}</span>
                                          </div>`;
                            } else {
                                qHtml += `<div class="text-sm text-gray-600 dark:text-gray-400 ml-2">${optionLetter}) ${cleanOption}</div>`;
                            }
                        });
                    }
                    qHtml += '</div>';
                } else {
                    qHtml += `<div class="theory-question shadow-sm dark:bg-blue-900/20 dark:text-blue-200 dark:border-blue-500"><span>${cleanStem}</span></div>`;
                }
                cell2.innerHTML = qHtml;
                
                let cell_type = row.insertCell();
                cell_type.className = 'px-4 py-4 text-center align-middle';
                const badgeColor = item.type === 'Theory' ? 'bg-amber-100 text-amber-800 border-amber-200' : 'bg-blue-100 text-blue-800 border-blue-200 dark:bg-blue-900 dark:text-blue-200 dark:border-blue-700';
                
                cell_type.innerHTML = `<span class="${badgeColor} border px-3 py-1 rounded-full text-xs font-bold shadow-sm whitespace-nowrap inline-block">${item.type}</span>`;
                
                let cell_chapter = row.insertCell();
                cell_chapter.className = 'px-4 py-4 text-left align-middle';
                const unitName = getUnitForChapter(item.chapter);
                
                cell_chapter.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-[10px] uppercase tracking-wide text-gray-400 font-bold mb-1">${unitName}</span>
                        <span class="text-xs font-medium leading-relaxed text-gray-700 dark:text-gray-300">${item.chapter}</span>
                    </div>
                `;

                let cell_exam = row.insertCell();
                cell_exam.className = 'px-4 py-4 text-xs text-gray-500 dark:text-gray-400 border-l border-gray-100 dark:border-gray-700 align-middle';
                cell_exam.innerHTML = `<div>${COLLEGE_NAME}</div><div class="font-semibold text-blue-600 dark:text-blue-400 mt-1">${item.examBatch}</div>`;

                let cell_ai = row.insertCell();
                cell_ai.className = 'px-4 py-4 text-center align-middle';
                cell_ai.innerHTML = `
                    <button onclick="askAI(this, qnaData[${index}])"
                        class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg shadow-sm transition-all duration-200 ease-in-out text-xs flex items-center justify-center mx-auto gap-1 w-24">
                        <span>Ask AI</span>
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    </button>`;
            });
        }

        function filterTable() {
            const searchText = document.getElementById("searchInput").value.toLowerCase();
            const table = document.getElementById("qnaTable");
            const tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                const row = tr[i];
                const dataIndex = row.getAttribute('data-index');
                const item = qnaData[dataIndex];
                let showRow = true;

                if (searchText) {
                    let rowText = (row.cells[1].textContent || "") + (row.cells[3].textContent || "") + (row.cells[4].textContent || "");
                    if (rowText.toLowerCase().indexOf(searchText) === -1) showRow = false;
                }
                if (showRow && filterState.types.size > 0 && !filterState.types.has(item.type)) showRow = false;
                if (showRow && filterState.chapters.size > 0 && !filterState.chapters.has(item.chapter)) showRow = false;
                if (showRow && filterState.exams.size > 0 && !filterState.exams.has(item.examBatch)) showRow = false;

                row.style.display = showRow ? "" : "none";
            }
        }

        function askAI(button, item) {
            let textToCopy;
            const cleanStem = item.stem.replace(/<[^>]*>/g, ""); 
            if (item.type === 'MCQ') {
                const optionLetters = ['A', 'B', 'C', 'D'];
                const optionsList = item.options ? item.options.map((opt, i) => `${optionLetters[i]}) ${opt}`).join('\n') : "Options not available";
                textToCopy = `I am studying for an OBG (Obstetrics and Gynaecology) exam. Please explain this MCQ in detail:\n\nQuestion: ${cleanStem}\n\nOptions:\n${optionsList}\n\nCorrect Answer Key: ${item.ans_key}\n\nPlease explain why this option is correct and why the others are incorrect. Refer to Chapter: ${item.chapter}`;
            } else {
                textToCopy = `I am studying for an OBG (Obstetrics and Gynaecology) exam. Please provide a structured model answer for the following theory question:\n\n"${cleanStem}"\n\nInclude relevant headings, clinical features, and management steps. Context: ${item.chapter}`;
            }
            
            const tempTextarea = document.createElement('textarea');
            tempTextarea.value = textToCopy;
            document.body.appendChild(tempTextarea);
            tempTextarea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextarea);

            showModal("Copied to Clipboard!", `<p class="text-sm text-gray-500 dark:text-gray-400">The question is ready. Open ChatGPT?</p>`, 
                `<button onclick="openChatGPT()" class="inline-flex w-full justify-center rounded-lg bg-blue-600 px-3 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 sm:w-auto">Go to ChatGPT</button>
                 <button type="button" onclick="closeModal()" class="mt-3 inline-flex w-full justify-center rounded-lg bg-white dark:bg-gray-700 px-3 py-2.5 text-sm font-semibold text-gray-900 dark:text-gray-200 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 sm:mt-0 sm:w-auto">Stay Here</button>`, 
                `<svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`);
        }

        function handleSecretClick() {
            const title = "Welcome!";
            const body = `<p class="text-gray-700 dark:text-gray-300 mb-4">Hello! Tell me your name.</p><input type="text" id="nameInput" placeholder="Enter name" class="mt-3 block w-full rounded-md border-gray-300 dark:border-gray-600 shadow-sm p-2 border bg-white dark:bg-gray-700 text-gray-900 dark:text-white">`;
            const footer = `<button type="button" onclick="handleNameSubmission()" class="inline-flex w-full justify-center rounded-lg bg-blue-600 px-3 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 sm:w-auto">Continue</button><button type="button" onclick="closeModal()" class="mt-3 inline-flex w-full justify-center rounded-lg bg-white dark:bg-gray-700 px-3 py-2.5 text-sm font-semibold text-gray-900 dark:text-gray-200 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 hover:bg-gray-50 dark:hover:bg-gray-600 sm:mt-0 sm:w-auto">Cancel</button>`;
            const icon = `<span class="text-2xl">☕️</span>`;
            showModal(title, body, footer, icon);
        }

        function handleNameSubmission() {
            const name = document.getElementById('nameInput') ? document.getElementById('nameInput').value.trim() : "";
            if (name.toLowerCase() === SECRET_CODE) { closeModal(); copyForChatGPT(); } 
            else if (name) {
                const randomIndex = Math.floor(Math.random() * motivationalMessages.length);
                let message = motivationalMessages[randomIndex].replace(/\[Name\]/g, name);
                showModal("Study Motivation!", `<p class="text-gray-700 dark:text-gray-300 text-base font-semibold">${message}</p>`, `<button type="button" onclick="closeModal()" class="inline-flex w-full justify-center rounded-lg bg-green-600 px-3 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-green-500 sm:w-auto">Back to Study</button>`, `<span class="text-2xl">💪</span>`);
            }
        }
        
        function copyForChatGPT() {
            const visibleQuestions = [];
            const tr = document.getElementById("qnaTable").getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                if (tr[i].style.display !== "none") visibleQuestions.push(qnaData[tr[i].getAttribute('data-index')]);
            }
            if(visibleQuestions.length === 0) return alert("No questions to copy");
            
            let clipboardText = `Create a checklist for these OBG questions:\n`;
            visibleQuestions.forEach(q => {
                const cleanStem = q.stem.replace(/\*\*(.*?)\*\*/g, "$1").replace(/<[^>]*>/g, "");
                clipboardText += `Q ${q.q}: ${cleanStem}\n`
            });
            
            const temp = document.createElement('textarea');
            temp.value = clipboardText;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand('copy');
            document.body.removeChild(temp);
            
            showModal("Copied!", `<p class="text-gray-600 dark:text-gray-400">Copied ${visibleQuestions.length} questions.</p>`, `<button onclick="openChatGPT()" class="bg-blue-600 text-white px-4 py-2 rounded">Go to ChatGPT</button>`, `<span>📋</span>`);
        }

        const modal = document.getElementById('actionModal');
        function showModal(title, bodyHtml, footerHtml, iconHtml) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body-content').innerHTML = bodyHtml;
            document.getElementById('modal-footer-buttons').innerHTML = footerHtml;
            document.getElementById('modalIcon').innerHTML = iconHtml;
            modal.classList.remove('hidden');
        }
        function closeModal() { modal.classList.add('hidden'); }
        function openChatGPT() { window.open('https://chat.openai.com/', '_blank'); closeModal(); }

        function fixPositioning() {
            if (modal && modal.parentElement !== document.body) {
                document.body.appendChild(modal);
            }
        }

        window.onload = () => { 
            fixPositioning(); 
            populateTable(); 
            populateFilters(); 
        };
    </script>
    <script src="deck-plugin.js"></script>
</body>
</html>
